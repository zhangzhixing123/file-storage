<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>共享文件存储</h2>
    <input type="file" id="fileInput" multiple>
    <br><br>
    <button id="uploadBtn">上传文件</button>
    <hr>
    <div id="fileList">正在加载文件列表...</div>

    <script>
        (function() {
            // 配置
            const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
            
            console.log('1. 开始初始化');
            
            // 创建 Supabase 客户端
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('2. Supabase 客户端创建完成');
            
            // 加载文件列表
            async function loadFiles() {
                console.log('3. loadFiles 开始执行');
                const container = document.getElementById('fileList');
                container.innerHTML = '正在加载...';
                
                try {
                    const { data, error } = await supabase.storage.from('files').list();
                    console.log('4. Supabase 返回结果', { data, error });
                    
                    if (error) {
                        container.innerHTML = '加载失败: ' + error.message;
                        return;
                    }
                    
                    if (!data || data.length === 0) {
                        container.innerHTML = '暂无文件，请上传';
                        return;
                    }
                    
                    let html = '';
                    for (let file of data) {
                        const url = supabase.storage.from('files').getPublicUrl(file.name).data.publicUrl;
                        html += `<div>📄 ${file.name} - <a href="${url}" target="_blank">查看/下载</a></div>`;
                    }
                    container.innerHTML = html;
                    console.log('5. 文件列表渲染完成，共', data.length, '个文件');
                } catch (err) {
                    console.error('6. loadFiles 出错:', err);
                    container.innerHTML = '加载出错: ' + err.message;
                }
            }
            
            // 上传文件（已修复：文件名安全处理）
            async function uploadFiles(files) {
                console.log('7. uploadFiles 开始，文件数量:', files.length);
                
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    // ✅ 修复：自动把中文/特殊字符变成合法文件名
                    const safeName = file.name.replace(/[^a-zA-Z0-9_\-.]/g, '_');
                    const fileName = Date.now() + '_' + safeName;
                    
                    console.log(`8. 正在上传第 ${i+1} 个文件:`, fileName);
                    
                    const { error } = await supabase.storage.from('files').upload(fileName, file);
                    if (error) {
                        alert(`上传失败: ${file.name} - ${error.message}`);
                        return false;
                    }
                    console.log(`9. 上传成功:`, fileName);
                }
                return true;
            }
            
            // 绑定上传按钮事件
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.onclick = async function() {
                console.log('10. 上传按钮被点击');
                const fileInput = document.getElementById('fileInput');
                const files = fileInput.files;
                
                if (!files.length) {
                    alert('请先选择文件');
                    return;
                }
                
                const success = await uploadFiles(files);
                if (success) {
                    alert('上传完成！');
                    fileInput.value = '';
                    await loadFiles();
                }
            };
            
            // 页面加载完成后自动加载文件列表
            console.log('11. 准备加载文件列表');
            loadFiles();
            console.log('12. 初始化完成');
        })();
    </script>
</body>
</html>
