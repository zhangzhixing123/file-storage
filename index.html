<!DOCTYPE html>
<html>
<head><title>快速测试</title></head>
<body>
    <h1>Supabase 连接测试</h1>
    <button onclick="test()">点击测试</button>
    <div id="result"></div>
    <script>
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publicIsTable_onL4oY10_bv7tVNAirgaaA_oTUN---';
        
        async function test() {
            const result = document.getElementById('result');
            result.innerText = '请求中...';
            try {
                const resp = await fetch(SUPABASE_URL + '/storage/v1/bucket/files', {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                result.innerText = '状态码: ' + resp.status;
                if (resp.status === 200) {
                    const data = await resp.json();
                    result.innerText += ' 成功！桶数量: ' + data.length;
                }
            } catch(e) {
                result.innerText = '错误: ' + e.message;
            }
        }
    </script>
</body>
</html>
