<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {font-family: Arial, sans-serif;padding: 20px;background: #f6f7f9;margin:0;}
        .login-wrap{
            width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;
            background:#f6f7f9;position:fixed;top:0;left:0;z-index:9999;
        }
        .login-box{width:320px;padding:30px;background:#fff;border-radius:10px;box-shadow:0 2px 15px rgba(0,0,0,0.1);}
        .login-title{text-align:center;font-size:20px;margin-bottom:25px;color:#333;}
        .login-input{width:100%;box-sizing:border-box;padding:12px 15px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:15px;}
        .login-select{width:100%;box-sizing:border-box;padding:12px 15px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:15px;}
        .login-btn{width:100%;padding:12px;background:#409eff;color:#fff;border:none;border-radius:6px;font-size:16px;margin-top:15px;cursor:pointer;}
        .hide-page{display:none !important;}

        .main-container {display: block;}
        .content-area {width: 100%;}
        .storage-box {background:#fff;padding:15px;border-radius:8px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .storage-line {display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap;}
        .storage-line input {width:80px;padding:4px;border:1px solid #ccc;border-radius:4px;}
        .progress-bar {width:100%;height:10px;background:#eee;border-radius:5px;overflow:hidden;margin:8px 0;}
        .progress-inner {height:100%;background:#409eff;transition:0.3s;}
        .tool-bar {margin: 15px 0;display: flex;gap: 10px;flex-wrap: wrap;align-items: center;}
        button {padding: 8px 14px;border: none;border-radius: 6px;background: #409eff;color: #fff;cursor: pointer;font-size:13px;}
        button.danger {background:#f56c6c;}
        button.warn {background:#e6a23c;}
        button.copy {background:#19b500;}
        button.consistency {background:#8e44ad;color:#fff;}
        button.reload {background:#2c3e50;color:#fff;}
        button.orphan-clean {background:#d63031;color:#fff;}
        button.orphan-view {background:#0984e3;color:#fff;}
        button.stats {background:#00b894;color:#fff;}
        .search-wrap {display: flex;gap: 5px;flex-wrap: wrap;align-items: center;}
        input.search, input.date-input {padding: 8px 12px;border: 1px solid #ddd;border-radius: 6px;min-width: 150px;}
        .file-item {background: #fff;padding: 10px 12px;margin: 6px 0;border-radius: 8px;display: flex;justify-content: space-between;align-items: center;flex-wrap:wrap;gap:8px;}
        .file-info {flex:1;min-width:200px;}
        .file-size-text, .file-time-text {font-size:12px;color:#666;margin-top:3px;}
        .file-grid {display: grid;grid-template-columns: repeat(3,1fr);gap:15px;margin-top:15px;}
        .grid-item {background:#fff;padding:12px;border-radius:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .grid-item img {width:100%;height:120px;object-fit:cover;border-radius:6px;}
        .grid-item .name {margin-top:8px;font-size:13px;word-break:break-all;}
        .view-mode {display:flex;gap:6px;}
        .view-mode button {background:#eee;color:#333;}
        .view-mode button.active {background:#409eff;color:#fff;border-color:#409eff;}
        a.btn-sm {padding:3px 6px;border-radius:4px;text-decoration:none;font-size:12px;color:#fff;}
        .auto-del-box{background:#fff;padding:12px;border-radius:8px;margin:15px 0;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .auto-del-select{padding:6px;border-radius:4px;border:1px solid #ccc;margin-right:8px;}
        
        .pagination{margin-top:20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .page-btn{padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;color:#000;}
        .page-btn.active{background:#409eff;color:#fff;border-color:#409eff;}
        .page-info{font-size:14px;color:#000;margin-left:10px;}
        .page-size-select{padding:6px;border-radius:4px;border:1px solid #ccc;color:#000;}
        
        .note-input{width:120px;padding:3px;border:1px solid #ddd;border-radius:3px;font-size:12px;}
        .search-type-select{padding:8px;border-radius:6px;border:1px solid #ddd;}
        .total-count{font-size:15px;color:#333;margin:10px 0;font-weight:bold;}
        .range-count{font-size:14px;color:#666;margin:6px 0;}
        .user-name-tip{color:#409eff;font-weight:bold;margin:8px 0;}
        .user-filter-group{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0;}
        .user-filter-group label{font-size:13px;cursor:pointer;}
        
        .date-filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #eee;
            width: fit-content;
        }
        .date-quick-row {
            display: flex;
            gap: 6px;
        }
        .date-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .date-quick-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: #f5f7fa;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            color: #000;
        }
        .date-quick-btn:hover {
            background: #e4e7ed;
        }
        .date-clear-btn {
            padding: 6px 10px;
            font-size: 12px;
            background: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .batch-note-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .batch-note-input{padding:6px 8px;border:1px solid #ddd;border-radius:4px;width:120px;}
        .refresh-btn {background:#909399;}
        .tool-bar button {font-size:12px;padding:6px 12px;}
        .tool-bar .search-wrap input {font-size:12px;padding:6px 10px;}
        .orphan-count-badge {
            background: #f56c6c;
            color: #fff;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-title">系统登录</div>
        <select class="login-select" id="loginUserName">
            <option value="">请选择登录人员</option>

<div class="main-container hide-page" id="mainSystem">
    <h2>📁 文件存储管理系统</h2>
    <div class="user-name-tip">当前登录人：<span id="nowLoginUser">暂无</span></div>
    <div class="total-count" id="totalCountText">筛选(文件名/备注/上传人)总文件数：0 个</div>
    <div class="range-count" id="rangeCountText">时间段内文件数：未选择时间范围</div>

    <div class="content-area">
        <div class="storage-box">
            <div class="storage-line">
                <span>总存储空间：</span>
                <input type="number" id="totalGB" value="1" min="0.1" step="0.1">
                <span>GB</span>

            <div class="progress-bar">
                <div class="progress-inner" id="storageProgress"></div>

        <div class="auto-del-box">
            <span>自动清理过期文件：</span>

                <option value="0">不自动删除</option>

        <div class="tool-bar">
            <button onclick="triggerFileUpload()">🖼️ 上传</button>
            <button class="warn" onclick="checkAll()">☑ 全选</button>

            <button id="batchDownload">📥 批量下载</button>

            <button class="consistency" onclick="checkAndFixConsistency()">🔗 数据一致性</button>
            <button class="orphan-clean" onclick="quickCleanOrphanFiles()">🧹 一键清理孤儿</button>
            <button class="orphan-view" onclick="viewOrphanFiles()">🔍 查看孤儿文件</button>

            <button class="copy" onclick="copySelectedFileNames()">📋 复制文件名</button>
            <button class="reload" onclick="forceReload()">🔄 重载</button>
            <button class="refresh-btn" onclick="forceRefresh()">🔄 刷新</button>

            <div class="search-wrap">
                <select class="search-type-select" id="searchType">
                    <option value="fuzzy">模糊搜索</option>
                    <option value="exact">精确搜索</option>

                <input class="search" id="search" placeholder="文件名批量搜索" style="min-width:120px;">
                <input class="search" id="noteSearch" placeholder="备注批量搜索" style="min-width:120px;">
                <button onclick="doSearch()">🔍 搜索</button>
            </div>

            <div class="user-filter-group">
                <span>上传人筛选：</span>
                <label><input type="checkbox" class="user-filter-chk" value="杜伊婷"> 杜伊婷</label>
                <label><input type="checkbox" class="user-filter-chk" value="潘哲"> 潘哲</label>
                <label><input type="checkbox" class="user-filter-chk" value="刘子蔚"> 刘子蔚</label>
                <label><input type="checkbox" class="user-filter-chk" value="谷晨辉"> 谷晨辉</label>
                <label><input type="checkbox" class="user-filter-chk" value="张之星"> 张之星</label>
                <button onclick="clearUserFilter()">清空</button>
            </div>

            <div class="date-filter-group">
                <div class="date-quick-row">
                    <button class="date-quick-btn" onclick="setQuickDate('today')">今天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('yesterday')">昨天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('7')">近7天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('15')">近15天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('30')">近30天</button>
                </div>
                <div class="date-input-row">
                    <input type="date" class="date-input" id="dateStart">
                    <span>~</span>
                    <input type="date" class="date-input" id="dateEnd">
                    <button class="date-clear-btn" onclick="clearDateFilter()">清空</button>
                </div>
            </div>

            <div class="batch-note-group">
                <input class="batch-note-input" id="batchNoteInput" placeholder="批量添加备注">
                <button onclick="batchAddNote()">批量新增备注</button>
                <button class="danger" onclick="batchClearNote()">批量清空备注</button>
            </div>

            <div class="view-mode">
                <button id="listBtn" class="active" onclick="changeView('list')">列表</button>
                <button id="gridBtn" onclick="changeView('grid')">九宫格</button>
            </div>
        </div>
        <hr>

        <div id="fileBox">加载中...</div>
        
        <div class="pagination" id="pagination">
            <span>每页显示：</span>
            <select class="page-size-select" id="pageSizeSelect">
                <option value="20">20条</option>
                <option value="50">50条</option>
                <option value="100">100条</option>
            </select>
            <div id="pageBtns"></div>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" multiple style="display:none">

<script>
const FIX_PWD = "123456";
const AUTO_REFRESH_INTERVAL = 10000;
const IDLE_RESTORE_TIME = 30000;

let autoRefreshTimer;
let currentLoginUser = "";
let isUserOperating = false;
let idleTimer = null;

let sb; 
let allFiles = [];
let viewType = 'list';
let searchTxt = '';
let noteSearchTxt = '';
let dateStart = '';
let dateEnd = '';
let totalStorageGB = parseFloat(localStorage.getItem('totalStorageGB')) || 1;
let autoDelDay = parseInt(localStorage.getItem('autoDelDay')) || 0;
let pageSize = parseInt(localStorage.getItem('pageSize')) || 20;
let currentPage = 1;
let filteredFiles = [];
let fileMeta = {};
let selectedUserFilters = [];

function startUserOperation() {
    isUserOperating = true;
    if (idleTimer) clearTimeout(idleTimer);
}

function endUserOperation() {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
        isUserOperating = false;
    }, IDLE_RESTORE_TIME);
}

function userLogin(){
    let userName = document.getElementById("loginUserName").value.trim();
    let pwd = document.getElementById("userPwd").value.trim();
    if(!userName){ alert("请先选择登录人员姓名"); return; }
    if(pwd === FIX_PWD){
        currentLoginUser = userName;
        document.getElementById("nowLoginUser").innerText = userName;
        document.getElementById("loginPage").classList.add("hide-page");
        document.getElementById("mainSystem").classList.remove("hide-page");
        
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        initApp();
    }else{ alert("密码错误"); }
}

function getPureFileName(name){
    return name.lastIndexOf('.') > 0 ? name.substring(0, name.lastIndexOf('.')) : name;
}

function getFileMeta(storeName){
    return fileMeta[storeName] || { uploader:"", note:"", origin_name:storeName };
}

function getDisplayFileName(storeName) {
    const meta = getFileMeta(storeName);
    if (!meta.origin_name || meta.origin_name.trim() === "" || meta.origin_name.trim().toUpperCase() === "EMPTY") {
        const nameParts = storeName.split("_");
        if (nameParts.length >= 2) {
            return nameParts.slice(1).join("_");
        }
        return storeName;
    }
    return meta.origin_name.trim();
}

window.copySingleFileName = async function(storeName){
    try {
        const realName = getDisplayFileName(storeName);
        let pure = getPureFileName(realName);
        await navigator.clipboard.writeText(pure);
        alert("复制成功：" + pure);
    }catch(e){ alert("复制失败，请重试"); }
}

window.copySelectedFileNames = async function(){
    let arr = Array.from(document.querySelectorAll(".file-chk:checked")).map(x => x.value);
    if(arr.length === 0){ alert("请先勾选文件"); return; }
    let text = arr.map(storeName=>{
        const realName = getDisplayFileName(storeName);
        return getPureFileName(realName);
    }).join(",");
    try {
        await navigator.clipboard.writeText(text);
        alert("批量复制成功！\n" + text);
    }catch(e){ alert("复制失败，请重试"); }
}

function initApp() {
    document.getElementById('totalGB').value = totalStorageGB;
    document.getElementById('delDaySelect').value = autoDelDay;
    document.getElementById('pageSizeSelect').value = pageSize;
    setDelText();

    document.getElementById('pageSizeSelect').addEventListener('change',function(){
        pageSize = parseInt(this.value);
        localStorage.setItem('pageSize', pageSize);
        currentPage = 1; renderFiles();
    });

    document.querySelectorAll('.user-filter-chk').forEach(chk=>{
        chk.addEventListener('change', function(){
            selectedUserFilters = Array.from(document.querySelectorAll('.user-filter-chk:checked')).map(c=>c.value);
            currentPage = 1; renderFiles();
        });
    });

    window.clearUserFilter = function(){
        document.querySelectorAll('.user-filter-chk').forEach(c=>c.checked=false);
        selectedUserFilters = []; currentPage=1; renderFiles();
    }

    document.getElementById('dateStart').addEventListener('change', function(){
        dateStart = this.value;
        currentPage = 1; renderFiles();
    });
    document.getElementById('dateEnd').addEventListener('change', function(){
        dateEnd = this.value;
        currentPage = 1; renderFiles();
    });

    window.clearDateFilter = function(){
        document.getElementById('dateStart').value = '';
        document.getElementById('dateEnd').value = '';
        dateStart = '';
        dateEnd = '';
        currentPage = 1; renderFiles();
    }

    loadAllFiles();
    startAutoRefresh();
}

function setDelText(){
    let map={0:'不自动删除',7:'7天前',15:'15天前',30:'30天前',60:'60天前',90:'90天前'};
    document.getElementById('nowDelSet').innerText=map[autoDelDay];
}

window.setQuickDate = function(type){
    let today = new Date();
    let start = new Date();
    let end = new Date();

    switch(type){
        case 'today':
            start = new Date(today);
            break;
        case 'yesterday':
            start.setDate(today.getDate() - 1);
            end.setDate(today.getDate() - 1);
            break;
        case '7':
            start.setDate(today.getDate() - 6);
            break;
        case '15':
            start.setDate(today.getDate() - 14);
            break;
        case '30':
            start.setDate(today.getDate() - 29);
            break;
    }

    const format = d => d.toISOString().split('T')[0];
    document.getElementById('dateStart').value = format(start);
    document.getElementById('dateEnd').value = format(end);
    dateStart = format(start);
    dateEnd = format(end);
    currentPage = 1;
    renderFiles();
}

window.saveFileNote = async function(storeName,el){
    let noteInputVal = el.value.trim();
    const meta = getFileMeta(storeName);
    meta.note = noteInputVal;
    fileMeta[storeName] = meta;
    try {
        await sb.from('file_notes').upsert([{ 
            file_name: storeName, 
            uploader: meta.uploader,
            note: meta.note,
            origin_name: meta.origin_name
        }]);
    } catch (e) {}
}

window.clearSingleNote = async function(storeName){
    if(!confirm("确定清空该文件的备注吗？")) return;
    const meta = getFileMeta(storeName);
    meta.note = "";
    fileMeta[storeName] = meta;
    await sb.from('file_notes').upsert([{ 
        file_name: storeName, 
        uploader: meta.uploader,
        note: "",
        origin_name: meta.origin_name
    }]);
    renderFiles();
}

window.batchAddNote = async function(){
    let noteText = document.getElementById('batchNoteInput').value.trim();
    if(!noteText){ alert("请输入要添加的备注内容"); return; }
    let selectedStores = Array.from(document.querySelectorAll(".file-chk:checked")).map(x => x.value);
    if(selectedStores.length === 0){ alert("请先勾选文件"); return; }

    if(!confirm(`确定为选中的 ${selectedStores.length} 个文件添加备注内容："${noteText}"？`)) return;

    for(let store of selectedStores){
        let meta = getFileMeta(store);
        meta.note = noteText;
        fileMeta[store] = meta;
        await sb.from('file_notes').upsert([{ 
            file_name: store, 
            uploader: meta.uploader,
            note: meta.note,
            origin_name: meta.origin_name
        }]);
    }
    alert("批量添加备注完成！");
    document.getElementById('batchNoteInput').value = "";
    renderFiles();
}

window.batchClearNote = async function(){
    let selectedStores = Array.from(document.querySelectorAll(".file-chk:checked")).map(x => x.value);
    if(selectedStores.length === 0){ alert("请先勾选文件"); return; }
    if(!confirm(`确定清空选中的 ${selectedStores.length} 个文件的备注？`)) return;

    for(let store of selectedStores){
        let meta = getFileMeta(store);
        meta.note = "";
        fileMeta[store] = meta;
        await sb.from('file_notes').upsert([{ 
            file_name: store, 
            uploader: meta.uploader,
            note: "",
            origin_name: meta.origin_name
        }]);
    }
    alert("批量清空备注完成！");
    renderFiles();
}

async function loadAllNotes() {
    const { data } = await sb.from('file_notes').select('*');
    fileMeta = {};
    if(data) data.forEach(item => {
        fileMeta[item.file_name] = {
            uploader: item.uploader || "",
            note: item.note || "",
            origin_name: item.origin_name || item.file_name
        };
    });
}

function formatSize(b) {
    if (!b) return "0 B";
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b / 1024).toFixed(2) + " KB";
    return (b / 1048576).toFixed(2) + " MB";
}

function formatTime(t) {
    return t ? new Date(t).toLocaleString() : "";
}

function getBeforeDayStr(day){
    let now = new Date();
    now.setDate(now.getDate() - day);
    return now.toISOString().split('T')[0];
}

document.getElementById('delDaySelect').addEventListener('change',function(){
    autoDelDay = parseInt(this.value);
    localStorage.setItem('autoDelDay', autoDelDay);
    setDelText();
})

// ========== 优化后的自动清理过期文件（先删存储，再删数据库） ==========
window.runAutoDelete = async function(){
    let day = parseInt(document.getElementById('delDaySelect').value);
    if(day === 0){ 
        alert("请先选择清理周期"); 
        return; 
    }
    
    let bd = getBeforeDayStr(day);
    
    // 先重新加载文件列表，确保数据最新
    await loadAllFiles(true);
    
    let dl = allFiles.filter(i => i.created_at && i.created_at.split('T')[0] < bd).map(i => i.name);
    
    if(dl.length === 0){ 
        alert("✅ 没有过期文件需要清理"); 
        return; 
    }
    
    if(!confirm(`将删除 ${dl.length} 个过期文件（${day}天前），确认？`)) return;
    
    let storageDelOk = false;
    let dbDelOk = false;
    let errorMsg = [];
    let successCount = 0;
    let failList = [];
    const MAX_RETRY = 3;
    
    // 1. 先尝试删除存储文件（带重试）
    let retryCount = 0;
    while (retryCount < MAX_RETRY && !storageDelOk) {
        try {
            // 分批删除存储文件，避免超时
            const batchSize = 20;
            let batchSuccess = 0;
            let batchFail = 0;
            
            for (let i = 0; i < dl.length; i += batchSize) {
                const batch = dl.slice(i, i + batchSize);
                try {
                    const { error } = await sb.storage.from("files").remove(batch);
                    if (error) throw error;
                    batchSuccess += batch.length;
                } catch (err) {
                    batchFail += batch.length;
                    failList.push(...batch);
                    console.error(`批次删除失败 (${i/batchSize + 1}):`, err);
                }
            }
            
            successCount = batchSuccess;
            if (batchFail === 0) {
                storageDelOk = true;
            } else {
                throw new Error(`部分删除失败: ${batchFail} 个文件未删除`);
            }
        } catch (err) {
            retryCount++;
            if (retryCount < MAX_RETRY) {
                console.log(`存储删除重试 ${retryCount}/${MAX_RETRY}`);
                await new Promise(r => setTimeout(r, 1000));
            } else {
                errorMsg.push(`存储文件删除失败（重试${MAX_RETRY}次后）：${err.message}`);
                console.error('存储文件删除失败:', err);
            }
        }
    }
    
    // 2. 只有存储删除成功后，才删除数据库记录
    if (storageDelOk && successCount > 0) {
        // 只删除成功删除的文件的数据库记录
        const successFiles = dl.filter(name => !failList.includes(name));
        if (successFiles.length > 0) {
            try {
                await sb.from('file_notes').delete().in('file_name', successFiles);
                dbDelOk = true;
            } catch (err) {
                errorMsg.push(`数据库删除失败：${err.message}`);
                console.error('数据库删除失败:', err);
            }
        }
    }
    
    // 3. 处理结果
    if (storageDelOk && dbDelOk) {
        alert(`✅ 清理完成！共删除 ${successCount} 个过期文件`);
    } else if (storageDelOk && !dbDelOk) {
        alert(`⚠️ 存储文件已删除（${successCount}个），但数据库记录删除失败：\n${errorMsg.join('\n')}\n\n💡 请使用「清理残留备注」功能清理数据库记录`);
    } else if (!storageDelOk && successCount > 0) {
        alert(`⚠️ 部分文件删除成功：${successCount} 个已删除，${dl.length - successCount} 个失败\n\n失败文件：${failList.join(', ')}\n\n💡 请使用「一键清理孤儿」功能处理残留文件`);
    } else {
        alert(`❌ 清理失败：\n${errorMsg.join('\n')}\n\n💡 请使用「一键清理孤儿」或「查看孤儿文件」功能手动处理`);
    }
    
    loadAllFiles();
}

// ========== 优化后的自动清理当容量满 ==========
async function autoCleanWhenFull(totalBytes){
    const total = totalStorageGB * 1024*1024*1024;
    const pct = total > 0 ? (totalBytes / total * 100) : 0;
    
    if(pct >= 99.9){
        let sorted = [...allFiles].sort((a,b)=> new Date(a.created_at||0) - new Date(b.created_at||0));
        let delCount = Math.ceil(sorted.length * 0.1);
        let delList = sorted.slice(0, delCount).map(i=>i.name);
        
        try {
            // 先删存储，再删数据库
            const { error: storageError } = await sb.storage.from("files").remove(delList);
            if (!storageError) {
                await sb.from('file_notes').delete().in('file_name', delList);
                console.log(`✅ 自动清理完成：删除 ${delList.length} 个文件`);
            } else {
                console.error('自动清理存储失败:', storageError);
            }
        } catch (err) {
            console.error('自动清理失败:', err);
        }
    }
}

function updateTotalSpace(totalBytes){
    let total = totalStorageGB * 1024*1024*1024;
    let pct = total > 0 ? (totalBytes / total * 100) : 0;
    let used = (totalBytes / 1024 / 1024).toFixed(2);
    let max = (totalStorageGB * 1024).toFixed(2);
    document.getElementById('storageProgress').style.width = pct+'%';
    document.getElementById('storageText').innerText = `总大小：${used} MB / 容量：${max} MB  占用：${pct.toFixed(2)}%`;
}

window.loadAllFiles = async function(isSilent = false){
    if (isUserOperating && isSilent) return;

    try {
        let { data, error } = await sb.storage.from("files").list();
        if(error) {
            alert("获取文件列表失败：" + error.message);
            return;
        }
        
        // 先获取所有数据库记录
        await loadAllNotes();
        
        // 只保留数据库中有记录的文件（过滤掉孤儿文件）
        const dbFileNames = new Set(Object.keys(fileMeta));
        allFiles = (data || []).filter(file => dbFileNames.has(file.name));
        
        allFiles.sort((a, b) => {
            let ta = a.created_at || a.updated_at || '';
            let tb = b.created_at || b.updated_at || '';
            return new Date(tb) - new Date(ta);
        });

        let total = 0;
        allFiles.forEach(i => total += i.metadata?.size || 0);
        await autoCleanWhenFull(total);
        updateTotalSpace(total);
        
        renderFiles();
    } catch(e) {
        console.error("加载失败:", e);
        alert("获取文件列表异常：" + e.message);
    }
}

document.getElementById("fileInput").onchange = async e => {
    const fs = e.target.files;
    const illegalChars = /[\\\/:*?"<>|\t\n\r\0-\x1F]/g;
    const existNames = allFiles.map(item => item.name);

    let successCount = 0;
    let failMsg = "";

    for (const f of fs) {
        const originFileName = f.name;
        let safeName = originFileName.replace(illegalChars, '');
        if (!safeName) safeName = `未命名_${Date.now()}`;

        const randomPrefix = Date.now() + "_";
        let storageFileName = randomPrefix + safeName;

        let repeatNum = 1;
        while (existNames.includes(storageFileName)) {
            const dotIndex = storageFileName.lastIndexOf('.');
            if (dotIndex > 0) {
                const namePart = storageFileName.slice(0, dotIndex);
                const extPart = storageFileName.slice(dotIndex);
                storageFileName = `${namePart}_${repeatNum}${extPart}`;
            } else {
                storageFileName = `${storageFileName}_${repeatNum}`;
            }
            repeatNum++;
        }
        existNames.push(storageFileName);

        try {
            // 先上传到存储
            const { error } = await sb.storage.from("files").upload(storageFileName, f);
            if (error) throw error;
            // 上传成功后再写数据库
            await sb.from('file_notes').upsert([{
                file_name: storageFileName,
                uploader: currentLoginUser,
                note: "",
                origin_name: originFileName
            }]);
            successCount++;
        } catch (err) {
            console.error(`文件【${originFileName}】上传失败：`, err);
            failMsg += `文件：${originFileName}\n错误：${err.message}\n\n`;
        }
    }

    if (failMsg) {
        alert(`上传完成，成功${successCount}个，失败${fs.length - successCount}个\n失败明细：\n${failMsg}`);
    } else {
        alert(`全部上传成功，共${successCount}个文件`);
    }

    e.target.value = "";
    currentPage = 1;
    loadAllFiles();
};

window.checkAndFixConsistency = async function() {
    if (!confirm("此操作将检查存储文件与数据库记录的一致性，并修复不匹配的数据，确定继续？")) return;
    
    let result = {
        orphanNotes: [],
        orphanFiles: [],
        fixed: 0
    };

    const { data: storageList, error: storageErr } = await sb.storage.from("files").list();
    if (storageErr) return alert("读取存储桶失败：" + storageErr.message);
    const storageFileSet = new Set(storageList.map(item => item.name));

    const { data: noteList, error: noteErr } = await sb.from("file_notes").select("file_name");
    if (noteErr) return alert("读取数据库失败：" + noteErr.message);
    const dbFileSet = new Set(noteList.map(item => item.file_name));

    result.orphanNotes = noteList
        .map(item => item.file_name)
        .filter(name => !storageFileSet.has(name));

    result.orphanFiles = storageList
        .map(item => item.name)
        .filter(name => !dbFileSet.has(name));

    let msg = `📊 数据一致性检查结果：\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `📁 存储文件总数：${storageList.length}\n`;
    msg += `📝 数据库记录数：${noteList.length}\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `⚠️ 残留备注（有记录无文件）：${result.orphanNotes.length} 条\n`;
    msg += `🔧 孤儿文件（有文件无记录）：${result.orphanFiles.length} 个\n`;

    if (result.orphanNotes.length === 0 && result.orphanFiles.length === 0) {
        return alert(msg + `\n✅ 数据完全一致，无需修复！`);
    }

    if (!confirm(msg + `\n\n是否自动修复这些问题？`)) return;

    let fixedCount = 0;
    // 修复孤儿文件：补充数据库记录
    for (const fileName of result.orphanFiles) {
        try {
            let originName = fileName;
            const parts = fileName.split("_");
            if (parts.length >= 2) {
                originName = parts.slice(1).join("_");
            }
            
            await sb.from('file_notes').upsert([{
                file_name: fileName,
                uploader: "未知用户（已修复）",
                note: "【自动修复】存储文件存在但记录缺失",
                origin_name: originName
            }]);
            fixedCount++;
        } catch (err) {
            console.error(`修复 ${fileName} 失败:`, err);
        }
    }

    // 清理残留备注
    if (result.orphanNotes.length > 0) {
        try {
            await sb.from('file_notes').delete().in('file_name', result.orphanNotes);
            fixedCount += result.orphanNotes.length;
        } catch (err) {
            console.error("清理残留备注失败:", err);
        }
    }

    alert(`✅ 修复完成！\n\n`
        + `🔧 孤儿文件补充记录：${result.orphanFiles.length} 个\n`
        + `🗑️ 残留备注已清理：${result.orphanNotes.length} 条\n`
        + `总计修复：${fixedCount} 项`);

    loadAllFiles();
}

        + `${fileList}\n\n`
        + `点击「确定」删除这些孤儿文件（从存储中移除）\n`
        + `点击「取消」仅为这些文件补充数据库记录（让它们显示在列表中）`
    );
    
    if (choice) {
        // 删除孤儿文件
        if (!confirm(`⚠️ 确定删除这 ${orphanFiles.length} 个孤儿文件吗？此操作不可恢复！`)) return;
        
        let successCount = 0;
        let failCount = 0;
        let failList = [];
        
        const batchSize = 20;
        for (let i = 0; i < orphanFiles.length; i += batchSize) {
            const batch = orphanFiles.slice(i, i + batchSize);
            const fileNames = batch.map(item => item.name);
            
            try {
                const { error } = await sb.storage.from("files").remove(fileNames);
                if (error) throw error;
                successCount += batch.length;
            } catch (err) {
                failCount += batch.length;
                failList.push(...fileNames);
                console.error('批量删除失败:', err);
            }
        }
        
        if (failCount > 0) {
            alert(`⚠️ 部分删除完成：成功 ${successCount} 个，失败 ${failCount} 个\n\n失败文件：\n${failList.join('\n')}`);
        } else {
            alert(`✅ 成功删除全部 ${successCount} 个孤儿文件！`);
        }
    } else {
        // 补充数据库记录
        if (!confirm(`确定为 ${orphanFiles.length} 个孤儿文件补充数据库记录？`)) return;
        
        let successCount = 0;
        for (const item of orphanFiles) {
            try {
                let originName = item.name;
                const parts = item.name.split("_");
                if (parts.length >= 2) {
                    originName = parts.slice(1).join("_");
                }
                
                await sb.from('file_notes').upsert([{
                    file_name: item.name,
                    uploader: "未知用户（已修复）",
                    note: "【自动修复】存储文件存在但记录缺失",
                    origin_name: originName
                }]);
                successCount++;
            } catch (err) {
                console.error(`修复 ${item.name} 失败:`, err);
            }
        }
        
        alert(`✅ 成功为 ${successCount} 个孤儿文件补充了数据库记录，现在可以在列表中看到并操作这些文件了！\n\n💡 请点击「刷新」按钮查看更新后的列表。`);
    }
    
    loadAllFiles();
}

// ========== 一键清理孤儿文件 ==========
window.quickCleanOrphanFiles = async function() {
    if (!confirm("此操作将查找并删除所有存储中存在但数据库无记录的文件，确定继续？")) return;
    
    const { data: storageList, error: storageErr } = await sb.storage.from("files").list();
    if (storageErr) return alert("读取存储桶失败：" + storageErr.message);
    
    const { data: noteList, error: noteErr } = await sb.from("file_notes").select("file_name");
    if (noteErr) return alert("读取数据库失败：" + noteErr.message);
    
    const dbFileSet = new Set(noteList.map(item => item.file_name));
    
    const orphanFiles = storageList
        .map(item => item.name)
        .filter(name => !dbFileSet.has(name));
    
    if (orphanFiles.length === 0) {
        return alert("✅ 没有发现孤儿文件");
    }
    
    if (!confirm(`发现 ${orphanFiles.length} 个孤儿文件，确定全部删除？`)) return;
    
    let successCount = 0;
    let failCount = 0;
    
    const batchSize = 20;
    for (let i = 0; i < orphanFiles.length; i += batchSize) {
        const batch = orphanFiles.slice(i, i + batchSize);
        try {
            const { error } = await sb.storage.from("files").remove(batch);
            if (!error) {
                successCount += batch.length;
            } else {
                throw error;
            }
        } catch (err) {
            failCount += batch.length;
            console.error(`批量删除失败 (批次 ${i/batchSize + 1}):`, err);
        }
    }
    
    if (failCount > 0) {
        alert(`⚠️ 部分删除完成：成功删除 ${successCount} 个，失败 ${failCount} 个\n\n💡 请再次运行「一键清理孤儿」或使用「查看孤儿文件」手动处理`);
    } else {
        alert(`✅ 成功删除全部 ${successCount} 个孤儿文件！`);
    }
    
    loadAllFiles();
}

window.forceReload = async function() {
    if (!confirm("将清除本地缓存并重新加载所有数据，确定继续？")) return;
    
    allFiles = [];
    fileMeta = {};
    filteredFiles = [];
    
    await loadAllFiles();
    alert("✅ 已强制重新加载所有数据");
}

window.forceRefresh = function(){
    loadAllFiles();
    alert("✅ 已强制刷新文件列表");
}

document.getElementById("batchDownload").onclick = async () => {
    let arr = Array.from(document.querySelectorAll(".file-chk:checked")).map(x => x.value);
    if(arr.length === 0){ alert("请先勾选文件"); return; }

    try {
        if (typeof JSZip === 'undefined') {
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        const zip = new JSZip();
        const promises = [];

        for (const storeName of arr) {
            const url = sb.storage.from("files").getPublicUrl(storeName).data.publicUrl;
            const encodedUrl = encodeURI(url);
            const showName = getDisplayFileName(storeName);
            const promise = fetch(encodedUrl)
                .then(res => res.blob())
                .then(blob => zip.file(showName, blob, { binary: true }));
            promises.push(promise);
        }

        await Promise.all(promises);
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        const date = new Date().toLocaleString().replace(/[/:, ]/g, '-');
        link.download = `文件批量下载_${date}.zip`;
        link.click();
        alert(`批量下载完成，共${arr.length}个文件`);
    } catch (err) {
        console.error('批量下载失败', err);
        alert('批量下载失败：' + err.message);
    }
};

function renderPagination(){
    const total = filteredFiles.length;
    const totalPages = Math.ceil(total / pageSize) || 1;
    const pager = document.getElementById('pageBtns');
    const info = document.getElementById('pageInfo');
    let html = '';
    html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>上一页</button>`;
    let startPage = Math.max(1, currentPage - 5);
    let endPage = Math.min(totalPages, currentPage + 4);
    for(let i=startPage; i<=endPage; i++){
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>下一页</button>`;
    pager.innerHTML = html;
    info.innerText = `第 ${currentPage} / ${totalPages} 页，共 ${total} 条`;
}

window.goPage = function(page){
    const totalPages = Math.ceil(filteredFiles.length / pageSize) || 1;
    if(page < 1 || page > totalPages) return;
    currentPage = page; renderFiles();
}

function renderFiles(){
    let searchMode = document.getElementById("searchType").value;
    let nameKeys = parseMultiKeywords(searchTxt);
    let noteKeys = parseMultiKeywords(noteSearchTxt);

    function matchBaseFilter(f){
        const storeName = f.name;
        const meta = getFileMeta(storeName);
        const realFileName = getDisplayFileName(storeName);
        const displayLower = realFileName.toLowerCase();
        const uploader = (meta.uploader || "").trim();
        const pureNoteText = meta.note.toLowerCase();

        let nameOk = true;
        let noteOk = true;
        let userOk = true;

        if(nameKeys.length > 0){
            if(searchMode === 'fuzzy'){
                nameOk = nameKeys.some(k => displayLower.includes(k));
            }else{
                nameOk = nameKeys.some(k => displayLower === k);
            }
        }
        if(noteKeys.length > 0){
            if(searchMode === 'fuzzy'){
                noteOk = noteKeys.some(k => pureNoteText.includes(k));
            }else{
                noteOk = noteKeys.some(k => pureNoteText === k);
            }
        }
        if(selectedUserFilters.length > 0){
            const cleanFilterUsers = selectedUserFilters.map(u => u.trim());
            userOk = cleanFilterUsers.includes(uploader);
        }
        return nameOk && noteOk && userOk;
    }

    const baseFiles = allFiles.filter(f => matchBaseFilter(f));
    filteredFiles = baseFiles.filter(f => {
        let fileTime = f.created_at || f.updated_at || '';
        let dateOk = true;
        if(dateStart && fileTime){
            const dayStr = fileTime.split('T')[0];
            if(dayStr < dateStart) dateOk = false;
        }
        if(dateEnd && fileTime){
            const dayStr = fileTime.split('T')[0];
            if(dayStr > dateEnd) dateOk = false;
        }
        return dateOk;
    });

    document.getElementById('totalCountText').innerText = `筛选(文件名/备注/上传人)总文件数：${baseFiles.length} 个`;
    if(dateStart || dateEnd){
        document.getElementById('rangeCountText').innerText = `叠加时间(${dateStart||'不限'} ~ ${dateEnd||'不限'})后展示文件数：${filteredFiles.length} 个`;
    }else{
        document.getElementById('rangeCountText').innerText = `时间段内文件数：未选择时间范围`;
    }

    const totalPages = Math.ceil(filteredFiles.length / pageSize) || 1;
    if(currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const pageFiles = filteredFiles.slice(start, end);

    let box = document.getElementById("fileBox");
    if(pageFiles.length === 0){
        box.innerHTML = "无匹配文件";
        renderPagination();
        return;
    }

    if(viewType === 'list'){
        let h = "";
        pageFiles.forEach(f => {
            const storeFileName = f.name;
            const meta = getFileMeta(storeFileName);
            const showName = getDisplayFileName(storeFileName);
            const uploadUser = (meta.uploader || "").trim();
            const fileNote = meta.note || "";
            const url = sb.storage.from("files").getPublicUrl(storeFileName).data.publicUrl;
            const size = formatSize(f.metadata?.size);
            const time = formatTime(f.created_at || f.updated_at);

            h += `
            <div class="file-item">
                <input type="checkbox" class="file-chk" value="${storeFileName}" onclick="startUserOperation(); endUserOperation();">
                <div class="file-info">
                    <div>${showName}
                        <button onclick="copySingleFileName('${storeFileName}')" style="padding:2px 6px;font-size:12px;background:#19b500;margin-left:6px;">复制</button>
                        <span style="margin-left:8px;color:#666;font-size:12px;">上传人：${uploadUser}</span>
                    </div>
                    <div class="file-size-text">大小：${size}</div>
                    <div class="file-time-text">上传时间：${time}</div>
                    <div style="margin-top:4px;display:flex;align-items:center;gap:6px;">
                        <input class="note-input" placeholder="填写自定义备注" value="${fileNote}"
                            onblur="saveFileNote('${storeFileName}',this)"
                            onkeydown="if(event.key==='Enter'){ saveFileNote('${storeFileName}',this); this.blur(); }">
                        <button onclick="clearSingleNote('${storeFileName}')" style="padding:2px 6px;font-size:12px;background:#f56c6c;">清空备注</button>
                    </div>
                </div>
                <div>
                    <a href="${url}" target="_blank" class="btn-sm" style="background:#909399">预览</a>
                    <a href="${url}" download="${encodeURIComponent(showName)}" class="btn-sm" style="background:#67c23a;margin:0 4px;">下载</a>
                    <button class="small danger" onclick="delOne('${storeFileName}')">删除</button>
                </div>
            </div>`;
        });
        box.innerHTML = h;
    }else{
        let h = '<div class="file-grid">';
        pageFiles.forEach(f => {
            const storeFileName = f.name;
            const meta = getFileMeta(storeFileName);
            const showName = getDisplayFileName(storeFileName);
            const uploadUser = (meta.uploader || "").trim();
            const fileNote = meta.note || "";
            const url = sb.storage.from("files").getPublicUrl(storeFileName).data.publicUrl;
            const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(storeFileName);
            const size = formatSize(f.metadata?.size);
            const time = formatTime(f.created_at || f.updated_at);

            h += `
            <div class="grid-item">
                <input type="checkbox" class="file-chk" value="${storeFileName}" onclick="startUserOperation(); endUserOperation();">
                ${isImg ? `<img src="${url}">` : `<div style="height:120px;line-height:120px;font-size:40px">📄</div>`}
                <div class="name">${showName}</div>
                <div style="font-size:12px;color:#409eff">上传人：${uploadUser}</div>
                <button onclick="copySingleFileName('${storeFileName}')" style="padding:2px 6px;font-size:12px;background:#19b500;margin-top:4px;">复制纯文件名</button>
                <div style="font-size:12px;color:#666">${size}</div>
                <div style="font-size:11px;color:#999">${time}</div>
                <div style="margin:4px 0;display:flex;align-items:center;gap:4px;justify-content:center;">
                    <input class="note-input" style="width:80px" placeholder="自定义备注" value="${fileNote}"
                        onblur="saveFileNote('${storeFileName}',this)"
                        onkeydown="if(event.key==='Enter'){ saveFileNote('${storeFileName}',this); this.blur(); }">
                    <button onclick="clearSingleNote('${storeFileName}')" style="padding:2px 4px;font-size:11px;background:#f56c6c;">清空</button>
                </div>
                <div style="margin-top:6px;display:flex;gap:4px;justify-content:center;">
                    <a href="${url}" target="_blank" class="btn-sm" style="font-size:11px;background:#909399">预览</a>
                    <a href="${url}" download="${encodeURIComponent(showName)}" class="btn-sm" style="font-size:11px;background:#67c23a">下载</a>
                    <button class="small danger" style="font-size:11px" onclick="delOne('${storeFileName}')">删除</button>
                </div>
            </div>`;
        });
        h += "</div>";
        box.innerHTML = h;
    }
    renderPagination();
}

function startAutoRefresh(){
    if(autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => { 
        if(currentLoginUser) loadAllFiles(true); 
    }, AUTO_REFRESH_INTERVAL);
}
