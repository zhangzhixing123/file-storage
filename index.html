<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>共享文件存储</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="text-align:center; margin-top:50px;">
        <h2>📁 共享文件存储</h2>
        <p>密码 123456</p>
        <input type="password" id="pwd" placeholder="请输入密码">
        <button onclick="login()">登录</button>
        <div id="msg" style="color:red"></div>
    </div>
    <div id="app" style="display:none; text-align:center;">
        <h3>上传文件</h3>
        <input type="file" id="fileInput" multiple>
        <div id="fileList"></div>
        <button onclick="logout()">退出</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
        const PASSWORD = '123456';
        let supabase;

        async function login() {
            const pwd = document.getElementById('pwd').value;
            if (pwd !== PASSWORD) {
                document.getElementById('msg').innerText = '密码错误';
                return;
            }
            document.getElementById('msg').innerText = '';
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            document.querySelector('body > div').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            await loadFiles();
        }

        function logout() {
            document.getElementById('app').style.display = 'none';
            document.querySelector('body > div').style.display = 'block';
            document.getElementById('pwd').value = '';
        }

        async function loadFiles() {
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = '加载中...';
            const { data, error } = await supabase.storage.from('files').list();
            if (error) {
                fileListDiv.innerHTML = '错误: ' + error.message;
                return;
            }
            if (!data || data.length === 0) {
                fileListDiv.innerHTML = '暂无文件';
                return;
            }
            fileListDiv.innerHTML = data.map(f => `<div>📄 ${f.name} <button onclick="downloadFile('${f.name}')">下载</button></div>`).join('');
        }

        window.downloadFile = async (fileName) => {
            const { data } = supabase.storage.from('files').getPublicUrl(fileName);
            window.open(data.publicUrl, '_blank');
        };

        document.getElementById('fileInput').onchange = async (e) => {
            const files = e.target.files;
            for (let file of files) {
                const fileName = Date.now() + '_' + file.name;
                await supabase.storage.from('files').upload(fileName, file);
            }
            await loadFiles();
        };
    </script>
</body>
</html>
