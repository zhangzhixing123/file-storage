<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Supabase 测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Supabase 连接测试</h2>
    <p>URL: https://ivmgttyeszqvlqnpqsrw.supabase.co</p>
    <p>KEY: sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V</p>
    <button onclick="test()">点击测试</button>
    <div id="result" style="margin-top:20px; white-space:pre-wrap; background:#f0f0f0; padding:10px;"></div>

    <script>
        async function test() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = '连接中...\n';
            
            try {
                // 创建客户端
                const supabase = window.supabase.createClient(
                    'https://ivmgttyeszqvlqnpqsrw.supabase.co',
                    'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V'
                );
                resultDiv.innerText += '✅ 客户端创建成功\n';
                
                // 尝试访问 storage
                resultDiv.innerText += '正在访问 Storage...\n';
                const { data, error } = await supabase.storage.from('files').list();
                
                if (error) {
                    resultDiv.innerText += '❌ 错误: ' + error.message;
                } else {
                    resultDiv.innerText += '✅ 成功！找到 ' + data.length + ' 个文件';
                }
            } catch (err) {
                resultDiv.innerText += '💥 异常: ' + err.message;
            }
        }
    </script>
</body>
</html>
