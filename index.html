<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {font-family: Arial, sans-serif;padding: 20px;background: #f6f7f9;margin:0;}
        .login-wrap{
            width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;
            background:#f6f7f9;position:fixed;top:0;left:0;z-index:9999;
        }
        .login-box{width:320px;padding:30px;background:#fff;border-radius:10px;box-shadow:0 2px 15px rgba(0,0,0,0.1);}
        .login-title{text-align:center;font-size:20px;margin-bottom:25px;color:#333;}
        .login-input{width:100%;box-sizing:border-box;padding:12px 15px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:15px;}
        .login-select{width:100%;box-sizing:border-box;padding:12px 15px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:15px;}
        .login-btn{width:100%;padding:12px;background:#409eff;color:#fff;border:none;border-radius:6px;font-size:16px;margin-top:15px;cursor:pointer;}
        .hide-page{display:none !important;}

        .main-container {display: block;}
        .content-area {width: 100%;}
        .storage-box {background:#fff;padding:15px;border-radius:8px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .storage-line {display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap;}
        .storage-line input {width:80px;padding:4px;border:1px solid #ccc;border-radius:4px;}
        .progress-bar {width:100%;height:10px;background:#eee;border-radius:5px;overflow:hidden;margin:8px 0;}
        .progress-inner {height:100%;background:#409eff;transition:0.3s;}
        .tool-bar {margin: 15px 0;display: flex;gap: 10px;flex-wrap: wrap;align-items: center;}
        button {padding: 8px 14px;border: none;border-radius: 6px;background: #409eff;color: #fff;cursor: pointer;}
        button.danger {background:#f56c6c;}
        button.warn {background:#e6a23c;}
        button.copy {background:#19b500;}
        .search-wrap {display: flex;gap: 5px;flex-wrap: wrap;align-items: center;}
        input.search, input.date-input {padding: 8px 12px;border: 1px solid #ddd;border-radius: 6px;min-width: 150px;}
        .file-item {background: #fff;padding: 10px 12px;margin: 6px 0;border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
        .file-info {flex:1;min-width:200px;}
        .file-size-text, .file-time-text {font-size:12px;color:#666;margin-top:3px;}
        .file-grid {display: grid;grid-template-columns: repeat(3,1fr);gap:15px;margin-top:15px;}
        .grid-item {background:#fff;padding:12px;border-radius:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .grid-item img {width:100%;height:120px;object-fit:cover;border-radius:6px;}
        .grid-item .name {margin-top:8px;font-size:13px;word-break:break-all;}
        .view-mode {display:flex;gap:6px;}
        .view-mode button {background:#eee;color:#333;}
        .view-mode button.active {background:#409eff;color:#fff;border-color:#409eff;}
        a.btn-sm {padding:3px 6px;border-radius:4px;text-decoration:none;font-size:12px;color:#fff;}
        .auto-del-box{background:#fff;padding:12px;border-radius:8px;margin:15px 0;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .auto-del-select{padding:6px;border-radius:4px;border:1px solid #ccc;margin-right:8px;}
        
        .pagination{margin-top:20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .page-btn{padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;color:#000;}
        .page-btn.active{background:#409eff;color:#fff;border-color:#409eff;}
        .page-info{font-size:14px;color:#000;margin-left:10px;}
        .page-size-select{padding:6px;border-radius:4px;border:1px solid #ccc;color:#000;}
        
        .note-input{width:120px;padding:3px;border:1px solid #ddd;border-radius:3px;font-size:12px;}
        .search-type-select{padding:8px;border-radius:6px;border:1px solid #ddd;}
        .total-count{font-size:15px;color:#333;margin:10px 0;font-weight:bold;}
        .range-count{font-size:14px;color:#666;margin:6px 0;}
        .user-name-tip{color:#409eff;font-weight:bold;margin:8px 0;}
        .user-filter-group{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0;}
        .user-filter-group label{font-size:13px;cursor:pointer;}
        
        .date-filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #eee;
            width: fit-content;
        }
        .date-quick-row {display: flex;gap: 6px;}
        .date-input-row {display: flex;gap: 6px;align-items: center;}
        .date-quick-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: #f5f7fa;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            color: #000;
        }
        .date-quick-btn:hover {background: #e4e7ed;}
        .date-clear-btn {
            padding: 6px 10px;
            font-size: 12px;
            background: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .batch-note-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .batch-note-input{padding:6px 8px;border:1px solid #ddd;border-radius:4px;width:120px;}
    </style>
</head>
<body>

<div class="login-wrap" id="loginPage">
    <div class="login-box">
        <div class="login-title">系统登录</div>
        <select class="login-select" id="loginUserName">
            <option value="">请选择登录人员</option>
            <option value="杜伊婷">杜伊婷</option>
            <option value="潘哲">潘哲</option>
            <option value="刘子蔚">刘子蔚</option>
            <option value="谷晨辉">谷晨辉</option>
            <option value="张之星">张之星</option>
        </select>
        <input class="login-input" id="userPwd" type="password" placeholder="请输入登录密码">
        <button class="login-btn" onclick="userLogin()">立即登录</button>
    </div>
</div>

<div class="main-container hide-page" id="mainSystem">
    <h2>📁 文件存储管理系统</h2>
    <div class="user-name-tip">当前登录人：<span id="nowLoginUser">暂无</span></div>
    <div class="total-count" id="totalCountText">总文件数：0 个</div>
    <div class="range-count" id="rangeCountText">时间段内文件数：未选择时间范围</div>

    <div class="content-area">
        <div class="storage-box">
            <div class="storage-line">
                <span>总存储空间：</span>
                <input type="number" id="totalGB" value="1" min="0.1" step="0.1">
                <span>GB</span>
                <button class="small" onclick="saveStorage()">确认修改</button>
            </div>
            <div class="progress-bar">
                <div class="progress-inner" id="storageProgress"></div>
            </div>
            <div id="storageText">加载中...</div>
        </div>

        <div class="auto-del-box">
            <span>自动清理过期文件：</span>
            <select class="auto-del-select" id="delDaySelect">
                <option value="0">不自动删除</option>
                <option value="7">7天前文件</option>
                <option value="15">15天前文件</option>
                <option value="30">30天前文件</option>
                <option value="60">60天前文件</option>
                <option value="90">90天前文件</option>
            </select>
            <button class="small danger" onclick="runAutoDelete()">立即清理</button>
            <span style="font-size:12px;color:#666;margin-left:10px;">当前：<span id="nowDelSet">不自动删除</span></span>
        </div>

        <div class="tool-bar">
            <button onclick="triggerFileUpload()">🖼️ 上传文件/图片</button>
            <button class="warn" onclick="checkAll()">☑ 一键全选</button>
            <button class="warn" onclick="unCheckAll()">☐ 取消全选</button>
            <button id="batchDownload">📥 批量下载</button>
            <button id="batchDelete" class="danger">🗑️ 批量删除</button>
            <button class="copy" onclick="copySelectedFileNames()">📋 批量复制纯文件名</button>

            <div class="search-wrap">
                <select class="search-type-select" id="searchType">
                    <option value="fuzzy">模糊搜索</option>
                    <option value="exact">精确搜索</option>
                </select>
                <input class="search" id="search" placeholder="文件名批量搜索(空格/逗号分隔)">
                <input class="search" id="noteSearch" placeholder="备注批量搜索(空格/逗号分隔)">
                <button onclick="doSearch()">🔍 搜索/刷新</button>
            </div>

            <div class="user-filter-group">
                <span>上传人筛选：</span>
                <label><input type="checkbox" class="user-filter-chk" value="杜伊婷"> 杜伊婷</label>
                <label><input type="checkbox" class="user-filter-chk" value="潘哲"> 潘哲</label>
                <label><input type="checkbox" class="user-filter-chk" value="刘子蔚"> 刘子蔚</label>
                <label><input type="checkbox" class="user-filter-chk" value="谷晨辉"> 谷晨辉</label>
                <label><input type="checkbox" class="user-filter-chk" value="张之星"> 张之星</label>
                <button onclick="clearUserFilter()">清空</button>
            </div>

            <div class="date-filter-group">
                <div class="date-quick-row">
                    <button class="date-quick-btn" onclick="setQuickDate('today')">今天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('yesterday')">昨天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('7')">近7天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('15')">近15天</button>
                    <button class="date-quick-btn" onclick="setQuickDate('30')">近30天</button>
                </div>
                <div class="date-input-row">
                    <input type="date" class="date-input" id="dateStart">
                    <span>~</span>
                    <input type="date" class="date-input" id="dateEnd">
                    <button class="date-clear-btn" onclick="clearDateFilter()">清空</button>
                </div>
            </div>

            <div class="batch-note-group">
                <input class="batch-note-input" id="batchNoteInput" placeholder="批量添加备注">
                <button onclick="batchAddNote()">批量新增备注</button>
                <button class="danger" onclick="batchClearNote()">批量清空备注</button>
            </div>

            <div class="view-mode">
                <button id="listBtn" class="active" onclick="changeView('list')">列表</button>
                <button id="gridBtn" onclick="changeView('grid')">九宫格</button>
            </div>
        </div>
        <hr>

        <div id="fileBox">加载中...</div>
        
        <div class="pagination" id="pagination">
            <span>每页显示：</span>
            <select class="page-size-select" id="pageSizeSelect">
                <option value="20">20条</option>
                <option value="50">50条</option>
                <option value="100">100条</option>
            </select>
            <div id="pageBtns"></div>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" multiple style="display:none">

<script>
const FIX_PWD = "123456";
const AUTO_REFRESH_INTERVAL = 10000;
const IDLE_RESTORE_TIME = 30000;

let autoRefreshTimer;
let currentLoginUser = "";
let isUserOperating = false;
let idleTimer = null;
let sb; 
let allFiles = [];
let viewType = 'list';
let searchTxt = '';
let noteSearchTxt = '';
let dateStart = '';
let dateEnd = '';
let totalStorageGB = parseFloat(localStorage.getItem('totalStorageGB')) || 1;
let autoDelDay = parseInt(localStorage.getItem('autoDelDay')) || 0;
let pageSize = parseInt(localStorage.getItem('pageSize')) || 20;
let currentPage = 1;
let filteredFiles = [];
let fileNotes = {};
let selectedUserFilters = [];

// 真实获取存储桶总大小（SQL函数）
async function getRealBucketSize() {
    try {
        const { data, error } = await sb.rpc('get_bucket_size', { bucket_name: 'files' });
        if (error) throw error;
        return data || 0;
    } catch (e) {
        console.error('获取真实大小失败', e);
        return 0;
    }
}

function startUserOperation() {
    isUserOperating = true;
    clearTimeout(idleTimer);
}

function endUserOperation() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => isUserOperating = false, IDLE_RESTORE_TIME);
}

function userLogin(){
    let userName = document.getElementById("loginUserName").value.trim();
    let pwd = document.getElementById("userPwd").value.trim();
    if(!userName){ alert("请选择登录人员"); return; }
    if(pwd === FIX_PWD){
        currentLoginUser = userName;
        document.getElementById("nowLoginUser").innerText = userName;
        document.getElementById("loginPage").classList.add("hide-page");
        document.getElementById("mainSystem").classList.remove("hide-page");
        
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        initApp();
    }else{ alert("密码错误"); }
}

function getPureFileName(name){
    return name.lastIndexOf('.')>0 ? name.substring(0,name.lastIndexOf('.')) : name;
}

window.copySingleFileName = async function(filename){
    try {
        await navigator.clipboard.writeText(getPureFileName(filename));
        alert("复制成功");
    }catch(e){ alert("复制失败") }
}

window.copySelectedFileNames = async function(){
    let arr = Array.from(document.querySelectorAll(".file-chk:checked")).map(x=>x.value);
    if(arr.length===0){alert("请勾选文件");return;}
    let text = arr.map(getPureFileName).join(",");
    try{await navigator.clipboard.writeText(text);alert("批量复制成功");}catch{e{alert("失败")}}
}

function initApp() {
    document.getElementById('totalGB').value = totalStorageGB;
    document.getElementById('delDaySelect').value = autoDelDay;
    document.getElementById('pageSizeSelect').value = pageSize;
    setDelText();

    document.getElementById('pageSizeSelect').addEventListener('change',function(){
        pageSize = parseInt(this.value);
        localStorage.setItem('pageSize',pageSize);
        currentPage=1;renderFiles();
    });

    document.querySelectorAll('.user-filter-chk').forEach(chk=>{
        chk.addEventListener('change',()=>{
            selectedUserFilters = Array.from(document.querySelectorAll('.user-filter-chk:checked')).map(c=>c.value);
            currentPage=1;renderFiles();
        });
    });

    window.clearUserFilter = function(){
        document.querySelectorAll('.user-filter-chk').forEach(c=>c.checked=false);
        selectedUserFilters=[];currentPage=1;renderFiles();
    }

    document.getElementById('dateStart').addEventListener('change',()=>{dateStart=document.getElementById('dateStart').value;currentPage=1;renderFiles();});
    document.getElementById('dateEnd').addEventListener('change',()=>{dateEnd=document.getElementById('dateEnd').value;currentPage=1;renderFiles();});

    window.clearDateFilter = function(){
        document.getElementById('dateStart').value='';
        document.getElementById('dateEnd').value='';
        dateStart='';dateEnd='';currentPage=1;renderFiles();
    }

    loadAllFiles();
    startAutoRefresh();
}

function setDelText(){
    let map={0:'不自动删除',7:'7天前',15:'15天前',30:'30天前',60:'60天前',90:'90天前'};
    document.getElementById('nowDelSet').innerText=map[autoDelDay];
}

window.setQuickDate = function(type){
    let today = new Date();
    let start = new Date();
    let end = new Date();
    switch(type){
        case 'today':start=today;break;
        case 'yesterday':start.setDate(today.getDate()-1);end.setDate(today.getDate()-1);break;
        case '7':start.setDate(today.getDate()-6);break;
        case '15':start.setDate(today.getDate()-14);break;
        case '30':start.setDate(today.getDate()-29);break;
    }
    const f = d=>d.toISOString().split('T')[0];
    document.getElementById('dateStart').value=f(start);
    document.getElementById('dateEnd').value=f(end);
    dateStart=f(start);dateEnd=f(end);currentPage=1;renderFiles();
}

window.saveFileNote = async function(filename,el){
    let note = el.value.trim();
    fileNotes[filename]=note;
    await sb.from('file_notes').upsert([{file_name:filename,note:note}]);
}

window.clearSingleNote = async function(filename){
    if(!confirm("确定清空？"))return;
    fileNotes[filename]="";
    await sb.from('file_notes').upsert([{file_name:filename,note:""}]);
    renderFiles();
}

window.batchAddNote = async function(){
    let t = document.getElementById('batchNoteInput').value.trim();
    if(!t){alert("请输入内容");return;}
    let arr = Array.from(document.querySelectorAll('.file-chk:checked')).map(x=>x.value);
    if(arr.length===0){alert("请勾选");return;}
    if(!confirm(`确认给${arr.length}个文件添加备注？`))return;
    for(let n of arr){
        let old = fileNotes[n]||"";
        fileNotes[n] = old ? old+" "+t : t;
        await sb.from('file_notes').upsert([{file_name:n,note:fileNotes[n]}]);
    }
    alert("完成");
    document.getElementById('batchNoteInput').value="";
    renderFiles();
}

window.batchClearNote = async function(){
    let arr = Array.from(document.querySelectorAll('.file-chk:checked')).map(x=>x.value);
    if(arr.length===0){alert("请勾选");return;}
    if(!confirm("确定清空？"))return;
    for(let n of arr){
        fileNotes[n]="";
        await sb.from('file_notes').upsert([{file_name:n,note:""}]);
    }
    alert("完成");
    renderFiles();
}

async function loadAllNotes(){
    const {data} = await sb.from('file_notes').select('*');
    fileNotes={};
    if(data)data.forEach(i=>fileNotes[i.file_name]=i.note);
}

function formatSize(b){
    if(!b)return"0 B";if(b<1024)return b+" B";if(b<1048576)return(b/1024).toFixed(2)+" KB";return(b/1048576).toFixed(2)+" MB";
}
function formatTime(t){return t?new Date(t).toLocaleString():"";}
function getBeforeDayStr(d){let n=new Date();n.setDate(n.getDate()-d);return n.toISOString().split('T')[0];}

document.getElementById('delDaySelect').addEventListener('change',function(){
    autoDelDay=parseInt(this.value);localStorage.setItem('autoDelDay',autoDelDay);setDelText();
})

window.runAutoDelete = async function(){
    let d=parseInt(document.getElementById('delDaySelect').value);
    if(d===0){alert("请选择周期");return;}
    let bd=getBeforeDayStr(d);
    let dl=allFiles.filter(i=>i.created_at&&i.created_at.split('T')[0]<bd).map(i=>i.name);
    if(dl.length===0){alert("无过期文件");return;}
    if(!confirm(`删除${dl.length}个？`))return;
    await sb.storage.from('files').remove(dl);
    await sb.from('file_notes').delete().in('file_name',dl);
    alert("完成");loadAllFiles();
}

async function autoCleanWhenFull(totalBytes){
    const max=totalStorageGB*1024**3;
    if(totalBytes/max>=0.999){
        let sorted=[...allFiles].sort((a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0));
        let del=sorted.slice(0,Math.ceil(sorted.length*0.1)).map(i=>i.name);
        await sb.storage.from('files').remove(del);
        await sb.from('file_notes').delete().in('file_name',del);
    }
}

window.saveStorage=function(){
    let v=parseFloat(document.getElementById('totalGB').value);
    if(isNaN(v)||v<=0){alert("无效容量");return;}
    totalStorageGB=v;localStorage.setItem('totalStorageGB',v);loadAllFiles();
}

// 更新真实总空间显示
async function updateRealStorage(){
    let realBytes = await getRealBucketSize();
    let maxBytes = totalStorageGB * 1024**3;
    let pct = maxBytes>0 ? (realBytes/maxBytes)*100 : 0;
    document.getElementById('storageProgress').style.width = pct+'%';
    document.getElementById('storageText').innerText = 
        `真实总占用：${(realBytes/1024**2).toFixed(2)} MB / 容量：${(maxBytes/1024**2).toFixed(2)} MB (${pct.toFixed(2)}%)`;
}

window.checkAll=()=>{startUserOperation();document.querySelectorAll('.file-chk').forEach(x=>x.checked=true);endUserOperation();}
window.unCheckAll=()=>{startUserOperation();document.querySelectorAll('.file-chk').forEach(x=>x.checked=false);endUserOperation();}
window.changeView=(t)=>{viewType=t;document.querySelectorAll('.view-mode button').forEach(x=>x.classList.remove('active'));document.getElementById(t==='list'?'listBtn':'gridBtn').classList.add('active');renderFiles();}

function parseMultiKeywords(s){return s.trim().split(/[\s,，]+/).filter(k=>k);}
window.doSearch=async()=>{startUserOperation();searchTxt=document.getElementById('search').value.toLowerCase();noteSearchTxt=document.getElementById('noteSearch').value.toLowerCase();currentPage=1;await loadAllFiles();endUserOperation();}
window.triggerFileUpload=()=>{startUserOperation();document.getElementById('fileInput').click();}

window.loadAllFiles = async function(isSilent=false){
    if(isUserOperating&&isSilent)return;
    try{
        let {data,error}=await sb.storage.from('files').list();
        if(error)throw error;
        allFiles=data||[];
        allFiles.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
        
        await updateRealStorage(); // 实时更新真实总占用
        await loadAllNotes();
        renderFiles();
    }catch(e){console.error(e);alert("加载失败");}
}

function renderFiles(){
    let mode=document.getElementById('searchType').value;
    let nk=parseMultiKeywords(searchTxt);
    let nt=parseMultiKeywords(noteSearchTxt);
    
    filteredFiles=allFiles.filter(f=>{
        let fn=f.name.toLowerCase();
        let nn=(fileNotes[f.name]||"").toLowerCase();
        let okName=true,okNote=true,okUser=true,okDate=true;
        
        if(nk.length)okName=mode==='fuzzy'?nk.some(k=>fn.includes(k)):nk.some(k=>fn===k);
        if(nt.length)okNote=mode==='fuzzy'?nt.some(k=>nn.includes(k)):nt.some(k=>nn===k);
        if(selectedUserFilters.length)okUser=selectedUserFilters.some(u=>nn.includes(u));
        
        let t=f.created_at||"";
        if(dateStart&&t){let d=t.split('T')[0];if(dateStart&&d<dateStart)okDate=false;if(dateEnd&&d>dateEnd)okDate=false;}
        return okName&&okNote&&okUser&&okDate;
    });

    document.getElementById('totalCountText').innerText=`总文件数：${filteredFiles.length} 个`;
    let box=document.getElementById('fileBox');
    let total=filteredFiles.length;
    let totalPage=Math.ceil(total/pageSize)||1;
    if(currentPage>totalPage)currentPage=totalPage;
    let pageFiles=filteredFiles.slice((currentPage-1)*pageSize,currentPage*pageSize);

    if(pageFiles.length===0){box.innerHTML="无匹配文件";renderPagination();return;}

    if(viewType==='list'){
        let h="";
        pageFiles.forEach(f=>{
            // 单文件大小 = 后台真实返回值
            let realSize = f.metadata?.size || 0;
            let url=sb.storage.from('files').getPublicUrl(f.name).data.publicUrl;
            let size=formatSize(realSize);
            let time=formatTime(f.created_at);
            let note=fileNotes[f.name]||"";
            h+=`
            <div class="file-item">
                <input type="checkbox" class="file-chk" value="${f.name}">
                <div class="file-info">
                    <div>${f.name} <button onclick="copySingleFileName('${f.name}')" style="padding:2px 6px;background:#19b500;font-size:12px">复制</button></div>
                    <div class="file-size-text">真实大小：${size}</div>
                    <div class="file-time-text">上传时间：${time}</div>
                    <div style="margin-top:4px;display:flex;gap:6px">
                        <input class="note-input" value="${note}" onblur="saveFileNote('${f.name}',this)" onkeydown="event.key==='Enter'&&saveFileNote('${f.name}',this)">
                        <button onclick="clearSingleNote('${f.name}')" style="padding:2px 6px;background:#f56c6c;font-size:12px">清空</button>
                    </div>
                </div>
                <div>
                    <a href="${url}" target="_blank" class="btn-sm" style="background:#909399">预览</a>
                    <a href="${url}" download="${f.name}" class="btn-sm" style="background:#67c23a;margin:0 4px">下载</a>
                    <button class="danger" onclick="delOne('${f.name}')" style="padding:4px 8px">删除</button>
                </div>
            </div>`;
        });
        box.innerHTML=h;
    }else{
        let h='<div class="file-grid">';
        pageFiles.forEach(f=>{
            let realSize = f.metadata?.size || 0;
            let url=sb.storage.from('files').getPublicUrl(f.name).data.publicUrl;
            let isImg=/\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
            let size=formatSize(realSize);
            let time=formatTime(f.created_at);
            let note=fileNotes[f.name]||"";
            h+=`
            <div class="grid-item">
                <input type="checkbox" class="file-chk" value="${f.name}">
                ${isImg?`<img src="${url}">`:`<div style="height:120px;line-height:120px;font-size:40px">📄</div>`}
                <div class="name">${f.name}</div>
                <div style="font-size:12px">真实大小：${size}</div>
                <div style="font-size:11px;color:#999">${time}</div>
                <div style="margin:4px 0;display:flex;gap:4px;justify-content:center">
                    <input class="note-input" style="width:80px" value="${note}" onblur="saveFileNote('${f.name}',this)">
                    <button onclick="clearSingleNote('${f.name}')" style="padding:2px 4px;background:#f56c6c;font-size:11px">清空</button>
                </div>
                <div style="display:flex;gap:4px;justify-content:center;margin-top:6px">
                    <a href="${url}" target="_blank" class="btn-sm" style="font-size:11px;background:#909399">预览</a>
                    <a href="${url}" download="${f.name}" class="btn-sm" style="font-size:11px;background:#67c23a">下载</a>
                    <button class="danger" style="font-size:11px" onclick="delOne('${f.name}')">删除</button>
                </div>
            </div>`;
        });
        box.innerHTML=h+'</div>';
    }
    renderPagination();
}

function renderPagination(){
    let total=filteredFiles.length;
    let totalPage=Math.ceil(total/pageSize)||1;
    let p=document.getElementById('pageBtns');
    let info=document.getElementById('pageInfo');
    let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>上一页</button>`;
    let s=Math.max(1,currentPage-5);
    let e=Math.min(totalPage,currentPage+4);
    for(let i=s;i<=e;i++)html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPage?'disabled':''}>下一页</button>`;
    p.innerHTML=html;
    info.innerText=`第 ${currentPage}/${totalPage} 页 共 ${total} 条`;
}

window.goPage=(p)=>{let t=Math.ceil(filteredFiles.length/pageSize)||1;if(p<1||p>t)return;currentPage=p;renderFiles();}

document.getElementById('fileInput').onchange=async e=>{
    for(let f of e.target.files){
        let safe=f.name.replace(/[^\w\u4e00-\u9fa5.\-]/g,'_');
        await sb.storage.from('files').upload(safe,f);
        await sb.from('file_notes').upsert([{file_name:safe,note:currentLoginUser}]);
    }
    alert("上传成功");
    e.target.value="";
    loadAllFiles();
}

window.delOne=async(n)=>{if(!confirm("确定删除？"))return;await sb.storage.from('files').remove([n]);await sb.from('file_notes').delete().eq('file_name',n);loadAllFiles();}
document.getElementById('batchDelete').onclick=async()=>{
    let arr=Array.from(document.querySelectorAll('.file-chk:checked')).map(x=>x.value);
    if(arr.length===0){alert("请勾选");return;}
    if(!confirm(`删除${arr.length}个？`))return;
    await sb.storage.from('files').remove(arr);
    await sb.from('file_notes').delete().in('file_name',arr);
    loadAllFiles();
}

document.getElementById('batchDownload').onclick=async()=>{
    let arr=Array.from(document.querySelectorAll('.file-chk:checked')).map(x=>x.value);
    if(arr.length===0){alert("请勾选");return;}
    if(typeof JSZip==='undefined')await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
    let z=new JSZip();
    await Promise.all(arr.map(n=>fetch(sb.storage.from('files').getPublicUrl(n).data.publicUrl).then(r=>r.blob()).then(b=>z.file(n,b))));
    let blob=await z.generateAsync({type:'blob'});
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`批量下载_${new Date().toLocaleString().replace(/[/:, ]/g,'-')}.zip`;
    a.click();
    alert("下载完成");
}

function startAutoRefresh(){
    clearInterval(autoRefreshTimer);
    autoRefreshTimer=setInterval(()=>currentLoginUser&&loadAllFiles(true),AUTO_REFRESH_INTERVAL);
}
</script>
</body>
</html>
