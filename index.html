<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Supabase 连接测试</h2>
    <button onclick="test()">点击测试连接</button>
    <div id="result"></div>

    <script>
        async function test() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '测试中...';
            
            const url = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
            const key = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
            
            try {
                // 直接测试 Supabase 连接
                const supabase = window.supabase.createClient(url, key);
                const { data, error } = await supabase.storage.from('files').list();
                
                if (error) {
                    resultDiv.innerHTML = '❌ 连接失败: ' + error.message;
                } else {
                    resultDiv.innerHTML = '✅ 连接成功！找到 ' + data.length + ' 个文件。配置正确！';
                }
            } catch (err) {
                resultDiv.innerHTML = '❌ 错误: ' + err.message;
            }
        }
    </script>
</body>
</html>
