<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f6f7f9;
        }
        .main-container {
            display: flex;
            gap: 20px;
        }
        /* 左侧分类栏 */
        .category-sidebar {
            width: 200px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .category-sidebar h3 {
            margin-top: 0;
            font-size: 16px;
        }
        .category-item {
            padding: 8px 10px;
            margin: 5px 0;
            background: #f0f2f5;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .category-item.active {
            background: #409eff;
            color: white;
        }
        .add-category-btn {
            margin-top: 10px;
            width: 100%;
            padding: 6px;
            background: #67c23a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 主内容区 */
        .content-area {
            flex: 1;
        }
        .tool-bar {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #409eff;
            color: white;
            cursor: pointer;
        }
        button.danger {
            background: #f56c6c;
        }
        button.success {
            background: #67c23a;
        }
        .search-wrap {
            display: flex;
            gap: 5px;
        }
        input.search {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            min-width: 220px;
        }
        input#fileInput {
            padding: 5px;
        }

        /* 列表模式 */
        .file-list {
            margin-top: 15px;
        }
        .file-item {
            background: white;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-item .name {
            flex: 1;
            margin-left: 10px;
        }

        /* 网格模式（9宫格，固定3列） */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .grid-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .grid-item img {
            max-width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
        }
        .grid-item .name {
            margin-top: 8px;
            font-size: 13px;
            word-break: break-all;
        }

        /* 视图切换 */
        .view-mode {
            display: flex;
            gap: 6px;
        }
        .view-mode button {
            background: #eee;
            color: #333;
        }
        .view-mode button.active {
            background: #409eff;
            color: white;
        }
    </style>
</head>
<body>

    <h2>📁 共享文件存储</h2>

    <div class="main-container">
        <!-- 左侧分类栏 -->
        <div class="category-sidebar">
            <h3>项目分类</h3>
            <div id="categoryList">
                <div class="category-item active" data-cat="all">全部文件</div>
            </div>
            <button class="add-category-btn" onclick="addCategory()">+ 新建分类</button>
        </div>

        <!-- 主内容区 -->
        <div class="content-area">
            <div class="tool-bar">
                <input type="file" id="fileInput" multiple webkitdirectory directory>
                <button id="uploadBtn">📤 上传文件/文件夹</button>
                <button id="batchDownload">📥 批量下载</button>
                <button id="batchDelete" class="danger">🗑️ 批量删除</button>
                <div class="search-wrap">
                    <input class="search" id="search" placeholder="🔍 搜索文件名...">
                    <button onclick="doSearch()">搜索</button>
                </div>
                <div class="view-mode">
                    <button id="viewList" class="active" onclick="switchView('list')">列表</button>
                    <button id="viewGrid" onclick="switchView('grid')">网格(9宫格)</button>
                </div>
            </div>

            <hr>

            <div id="fileList">正在加载文件列表...</div>
        </div>
    </div>

    <script>
        (function() {
            // 配置
            const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';

            let supabase;
            let allFiles = [];
            let currentView = 'list';
            let searchKeyword = '';
            let categories = JSON.parse(localStorage.getItem('fileCategories')) || ['全部文件'];

            console.log('初始化');
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            renderCategories();
            loadFiles();

            // 渲染分类
            function renderCategories() {
                const container = document.getElementById('categoryList');
                let html = '';
                categories.forEach((cat, index) => {
                    const activeClass = index === 0 ? 'active' : '';
                    html += `<div class="category-item ${activeClass}" data-cat="${cat}" onclick="selectCategory(this)">${cat}</div>`;
                });
                container.innerHTML = html;
            }

            // 新建分类
            window.addCategory = function() {
                const name = prompt('请输入分类名称:');
                if (name && !categories.includes(name)) {
                    categories.push(name);
                    localStorage.setItem('fileCategories', JSON.stringify(categories));
                    renderCategories();
                }
            };

            // 选择分类
            window.selectCategory = function(el) {
                document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                el.classList.add('active');
            };

            // 加载文件列表
            async function loadFiles() {
                const container = document.getElementById('fileList');
                container.innerHTML = '正在加载...';
                try {
                    const { data, error } = await supabase.storage.from('files').list();
                    if (error) {
                        container.innerHTML = '加载失败: ' + error.message;
                        return;
                    }
                    allFiles = data || [];
                    renderFiles();
                } catch (err) {
                    container.innerHTML = '加载出错: ' + err.message;
                }
            }

            // 渲染文件（支持模糊+精确搜索）
            function renderFiles() {
                const container = document.getElementById('fileList');
                let list = allFiles.filter(f => {
                    const name = f.name.toLowerCase();
                    const kw = searchKeyword.toLowerCase();
                    return name.includes(kw);
                });

                if (list.length === 0) {
                    container.innerHTML = '暂无文件';
                    return;
                }

                if (currentView === 'list') {
                    renderList(list);
                } else {
                    renderGrid(list);
                }
            }

            // 列表模式（带复选框）
            function renderList(list) {
                let html = '';
                list.forEach(file => {
                    const url = supabase.storage.from('files').getPublicUrl(file.name).data.publicUrl;
                    html += `
                    <div class="file-item">
                        <input type="checkbox" class="file-check" value="${file.name}">
                        <span class="name">${file.name}</span>
                        <div>
                            <a href="${url}" target="_blank">查看</a> &nbsp;
                            <button onclick="delSingle('${file.name}')" style="padding:4px 8px;font-size:12px">删除</button>
                        </div>
                    </div>`;
                });
                document.getElementById('fileList').innerHTML = html;
            }

            // 网格模式（9宫格，修复布局问题）
            function renderGrid(list) {
                let html = '';
                list.forEach(file => {
                    const url = supabase.storage.from('files').getPublicUrl(file.name).data.publicUrl;
                    const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
                    html += `
                    <div class="grid-item">
                        <input type="checkbox" class="file-check" value="${file.name}">
                        ${isImg ? `<img src="${url}">` : '<div style="height:120px;line-height:120px">📄</div>'}
                        <div class="name">${file.name}</div>
                    </div>`;
                });
                document.getElementById('fileList').innerHTML = html;
            }

            // 切换视图
            window.switchView = function(mode) {
                currentView = mode;
                document.querySelectorAll('.view-mode button').forEach(b => b.classList.remove('active'));
                document.getElementById('view' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
                renderFiles();
            };

            // 搜索（带按钮触发，支持模糊匹配）
            window.doSearch = function() {
                searchKeyword = document.getElementById('search').value;
                renderFiles();
            };

            // 上传（支持文件夹层级、单张/多张图片，保留原文件名）
            document.getElementById('uploadBtn').onclick = async () => {
                const input = document.getElementById('fileInput');
                const files = input.files;
                if (!files.length) {
                    alert('请选择文件或文件夹');
                    return;
                }
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    // 处理文件夹层级，保留相对路径
                    const filePath = file.webkitRelativePath || file.name;
                    // 修复中文/特殊字符问题，保留原文件路径和名称
                    const safePath = filePath.replace(/[^\u4e00-\u9fa5a-zA-Z0-9_\-./]/g, '_');
                    await supabase.storage.from('files').upload(safePath, file);
                }
                alert('上传完成！');
                input.value = '';
                loadFiles();
            };

            // 单个删除
            window.delSingle = async (name) => {
                if (!confirm('确定删除？')) return;
                await supabase.storage.from('files').remove([name]);
                loadFiles();
            };

            // 批量删除
            document.getElementById('batchDelete').onclick = async () => {
                const checks = document.querySelectorAll('.file-check:checked');
                const arr = Array.from(checks).map(c => c.value);
                if (arr.length === 0) {
                    alert('请选择文件');
                    return;
                }
                if (!confirm(`确定删除 ${arr.length} 个文件？`)) return;
                await supabase.storage.from('files').remove(arr);
                loadFiles();
            };

            // 批量下载
            document.getElementById('batchDownload').onclick = () => {
                const checks = document.querySelectorAll('.file-check:checked');
                const arr = Array.from(checks).map(c => c.value);
                if (arr.length === 0) {
                    alert('请选择文件');
                    return;
                }
                arr.forEach(name => {
                    const url = supabase.storage.from('files').getPublicUrl(name).data.publicUrl;
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    a.click();
                });
            };
        })();
    </script>
</body>
</html>
