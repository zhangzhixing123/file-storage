<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私有文件存储系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
        }

        body {
            background: #f4f7fc;
            color: #333;
        }

        .login-wrap {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 90%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
        }

        .login-box h2 {
            color: #222;
            margin-bottom: 12px;
            font-size: 24px;
        }

        .login-box p {
            color: #999;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .login-box button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 17px;
            cursor: pointer;
        }

        .err-tip {
            color: #f56c6c;
            font-size: 14px;
            height: 20px;
        }

        .container {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: #fff;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 20px;
            color: #222;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        .toolbar input.search {
            flex: 1;
            min-width: 220px;
            height: 42px;
            padding: 0 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
        }

        .toolbar button {
            padding: 0 18px;
            height: 42px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-primary { background: #667eea; color: #fff; }
        .btn-success { background: #40b970; color: #fff; }
        .btn-danger { background: #f56c6c; color: #fff; }

        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-bar button {
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            background: #eef1f8;
            cursor: pointer;
        }

        .category-bar button.active {
            background: #667eea;
            color: #fff;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .file-card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .file-preview {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fc;
        }

        .file-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-icon { font-size: 48px; }
        .file-desc { padding: 12px; }
        .file-name { font-size: 13px; word-break: break-all; }
        .file-time { font-size: 11px; color: #999; margin-top: 6px; }
        .file-check { padding: 8px 12px; border-top: 1px solid #f4f4f4; display: flex; justify-content: space-between; }
        .empty-tip { text-align: center; padding: 80px 0; color: #999; }

        .preview-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 999;
        }
        .preview-modal.show { display: flex; }
        .preview-modal img, .preview-modal video { max-width: 90%; max-height: 90%; }
        .close-preview { position: absolute; top: 30px; right: 30px; font-size: 30px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-wrap" id="loginPage">
    <div class="login-box">
        <h2>🔐 私有文件存储系统</h2>
        <p>输入访问密码进入系统</p>
        <input type="password" id="pwdInput" placeholder="请输入登录密码">
        <div class="err-tip" id="errTip"></div>
        <button id="loginBtn">立即登录</button>
    </div>
</div>

<div class="container" id="mainPage">
    <div class="header">
        <h1>📁 我的私有文件库</h1>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>

    <div class="toolbar">
        <input type="file" id="fileUpload" multiple webkitdirectory directory>
        <button class="btn-primary" id="uploadBtn">📤 上传/上传文件夹</button>
        <button class="btn-success" id="batchDlBtn">📥 批量下载选中</button>
        <button class="btn-danger" id="batchDelBtn">🗑️ 批量删除选中</button>
        <input class="search" id="searchInput" placeholder="🔍 搜索文件名称...">
    </div>

    <div class="category-bar">
        <button class="active" data-cat="all">全部文件</button>
        <button data-cat="image">🖼️ 图片</button>
        <button data-cat="video">🎬 视频</button>
        <button data-cat="audio">🎵 音频</button>
        <button data-cat="doc">📄 文档</button>
        <button data-cat="other">📦 其他</button>
    </div>

    <div class="file-grid" id="fileBox"><div class="empty-tip">加载中...</div></div>
</div>

<div class="preview-modal" id="previewModal">
    <span class="close-preview">×</span>
    <div id="previewContent"></div>
</div>

<script>
    // ========== 配置 ==========
    const SUPABASE_URL = "https://ivmgttyeszqvlqnpqsrw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V";
    const LOGIN_PASS = "123456";

    // 初始化
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let allFiles = [];
    let currentCategory = "all";

    // 登录（修复完成）
    document.getElementById("loginBtn").onclick = function () {
        const val = document.getElementById("pwdInput").value.trim();
        const err = document.getElementById("errTip");
        if (val !== LOGIN_PASS) {
            err.innerText = "密码错误！";
            return;
        }
        err.innerText = "";
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        loadFiles();
    };

    // 回车登录
    document.getElementById("pwdInput").onkeydown = function (e) {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    };

    // 退出
    document.getElementById("logoutBtn").onclick = function () {
        document.getElementById("mainPage").style.display = "none";
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("pwdInput").value = "";
    };

    // 文件类型
    function getFileType(name) {
        const ext = name.split(".").pop().toLowerCase();
        const img = ["jpg","jpeg","png","gif","webp","bmp","svg"];
        const video = ["mp4","mov","avi","mkv","flv","webm"];
        const audio = ["mp3","wav","flac","m4a"];
        const doc = ["txt","pdf","doc","docx","xls","xlsx","ppt","pptx"];
        if (img.includes(ext)) return "image";
        if (video.includes(ext)) return "video";
        if (audio.includes(ext)) return "audio";
        if (doc.includes(ext)) return "doc";
        return "other";
    }

    function getFileIcon(t) {
        if(t==="image")return"🖼️";if(t==="video")return"🎬";if(t==="audio")return"🎵";if(t==="doc")return"📄";return"📦";
    }

    // 加载文件
    async function loadFiles() {
        const box = document.getElementById("fileBox");
        const { data, error } = await supabase.storage.from("files").list();
        if (error) { box.innerHTML = `<div class="empty-tip">错误：${error.message}</div>`; return; }
        allFiles = data || [];
        filterFiles();
    }

    // 筛选
    function filterFiles() {
        const key = document.getElementById("searchInput").value.toLowerCase();
        let list = allFiles;
        if (currentCategory !== "all") list = list.filter(i => getFileType(i.name) === currentCategory);
        if (key) list = list.filter(i => i.name.toLowerCase().includes(key));
        render(list);
    }

    // 分类切换
    document.querySelectorAll(".category-bar button").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".category-bar button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            filterFiles();
        };
    });

    // 搜索
    document.getElementById("searchInput").oninput = filterFiles;

    // 渲染
    function render(list) {
        const box = document.getElementById("fileBox");
        if (!list.length) { box.innerHTML = '<div class="empty-tip">暂无文件</div>'; return; }
        let html = "";
        list.forEach(item => {
            const t = getFileType(item.name);
            const icon = getFileIcon(t);
            const url = supabase.storage.from("files").getPublicUrl(item.name).data.publicUrl;
            const time = new Date(item.created_at).toLocaleString();
            html += `
            <div class="file-card">
                <div class="file-preview" onclick="pre('${url}','${t}')">
                    ${t==="image"?`<img src="${url}">`:`<span class="file-icon">${icon}</span>`}
                </div>
                <div class="file-desc">
                    <div class="file-name">${item.name}</div>
                    <div class="file-time">${time}</div>
                </div>
                <div class="file-check">
                    <input type="checkbox" class="check-item" value="${item.name}">
                    <button style="background:#f56c6c;color:white;border:none;border-radius:4px" onclick="del('${item.name}')">删除</button>
                </div>
            </div>`;
        });
        box.innerHTML = html;
    }

    // 预览
    function pre(url, t) {
        const m = document.getElementById("previewModal");
        const c = document.getElementById("previewContent");
        if (t === "image") c.innerHTML = `<img src="${url}">`;
        else if (t === "video") c.innerHTML = `<video controls src="${url}">`;
        else { alert("仅支持图片/视频预览"); return; }
        m.style.display = "flex";
    }

    // 关闭预览
    document.querySelector(".close-preview").onclick = () => {
        document.getElementById("previewModal").style.display = "none";
    };

    // 上传
    document.getElementById("uploadBtn").onclick = async () => {
        const i = document.getElementById("fileUpload");
        const files = i.files;
        if (!files.length) { alert("请选择文件/文件夹"); return; }
        for (let f of files) {
            const safe = f.name.replace(/[^a-z0-9_\-.]/gi,"_");
            await supabase.storage.from("files").upload(Date.now()+"_"+safe, f);
        }
        alert("上传完成！");
        i.value = "";
        loadFiles();
    };

    // 删除单个
    async function del(name) {
        if(!confirm("确定删除？"))return;
        await supabase.storage.from("files").remove([name]);
        loadFiles();
    }

    // 批量删除
    document.getElementById("batchDelBtn").onclick = async () => {
        const arr = Array.from(document.querySelectorAll(".check-item:checked")).map(i=>i.value);
        if(!arr.length){alert("请勾选");return;}
        if(!confirm(`删除 ${arr.length} 个？`))return;
        await supabase.storage.from("files").remove(arr);
        loadFiles();
    };

    // 批量下载
    document.getElementById("batchDlBtn").onclick = () => {
        const arr = Array.from(document.querySelectorAll(".check-item:checked")).map(i=>i.value);
        if(!arr.length){alert("请勾选");return;}
        arr.forEach(n=>{
            const u = supabase.storage.from("files").getPublicUrl(n).data.publicUrl;
            const a = document.createElement("a");
            a.href=u;a.download=n;a.click();
        });
    };
</script>
</body>
</html>
