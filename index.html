<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>共享文件存储</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; text-align: center; margin-top: 50px; }
        input, button { padding: 8px 16px; margin: 8px; }
        .file-item { border: 1px solid #ccc; margin: 8px auto; padding: 8px; width: 300px; }
    </style>
</head>
<body>

    <h2>📁 共享文件存储</h2>
    
    <!-- 文件上传区域 -->
    <div>
        <input type="file" id="fileInput" multiple>
        <button onclick="uploadFiles()">上传文件</button>
    </div>

    <!-- 文件列表 -->
    <div id="fileList" style="margin-top: 20px;">加载中...</div>

    <script>
        // 您的配置
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
        
        let supabase;

        // 初始化
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        loadFiles();

        // 加载文件列表
        async function loadFiles() {
            const container = document.getElementById('fileList');
            container.innerHTML = '加载中...';
            
            const { data, error } = await supabase.storage.from('files').list();
            if (error) {
                container.innerHTML = '加载失败: ' + error.message;
                return;
            }
            
            if (!data || data.length === 0) {
                container.innerHTML = '暂无文件，请上传';
                return;
            }
            
            container.innerHTML = data.map(file => {
                const url = supabase.storage.from('files').getPublicUrl(file.name).data.publicUrl;
                const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
                return `
                    <div class="file-item">
                        ${isImage ? `<img src="${url}" style="max-width:100px; max-height:100px; display:block; margin:0 auto;">` : '📄'}
                        <strong>${file.name}</strong>
                        <button onclick="window.open('${url}', '_blank')">查看/下载</button>
                    </div>
                `;
            }).join('');
        }

        // 上传文件
        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            if (!files.length) return;
            
            for (let file of files) {
                const fileName = Date.now() + '_' + file.name;
                const { error } = await supabase.storage.from('files').upload(fileName, file);
                if (error) {
                    alert('上传失败: ' + error.message);
                }
            }
            await loadFiles();
            document.getElementById('fileInput').value = '';
        }
    </script>
</body>
</html>
