<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>共享文件存储</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>📁 共享文件存储</h2>

    <div>
        <input type="file" id="fileInput" multiple>
        <button id="uploadBtn">上传文件</button>
    </div>

    <div id="fileList" style="margin-top:20px;">加载中...</div>

    <script>
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
        
        let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentFiles = [];

        // 加载文件列表
        async function loadFiles() {
            const container = document.getElementById('fileList');
            container.innerHTML = '加载中...';
            console.log('正在加载文件...');
            
            const { data, error } = await supabase.storage.from('files').list();
            if (error) {
                console.error('加载错误:', error);
                container.innerHTML = '加载失败: ' + error.message;
                return;
            }
            
            console.log('加载成功，文件数:', data?.length);
            currentFiles = data || [];
            
            if (!currentFiles.length) {
                container.innerHTML = '暂无文件，请上传';
                return;
            }
            
            container.innerHTML = currentFiles.map(file => {
                const url = supabase.storage.from('files').getPublicUrl(file.name).data.publicUrl;
                const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
                return `
                    <div style="border:1px solid #ccc; margin:8px; padding:8px; width:300px;">
                        ${isImage ? `<img src="${url}" style="max-width:100px; max-height:100px; display:block;">` : '📄'}
                        <strong>${file.name}</strong>
                        <button onclick="window.open('${url}', '_blank')">查看/下载</button>
                    </div>
                `;
            }).join('');
        }

        // 上传文件
        async function uploadFiles() {
            const input = document.getElementById('fileInput');
            const files = input.files;
            
            console.log('uploadFiles 被调用，文件数量:', files.length);
            
            if (!files.length) {
                alert('请先选择文件');
                return;
            }
            
            for (let file of files) {
                const fileName = Date.now() + '_' + file.name;
                console.log('正在上传:', fileName);
                
                const { error } = await supabase.storage.from('files').upload(fileName, file);
                if (error) {
                    console.error('上传失败:', error);
                    alert('上传失败: ' + error.message);
                    return;
                } else {
                    console.log('上传成功:', fileName);
                }
            }
            
            alert('上传完成！');
            input.value = '';
            await loadFiles();
        }

        // 绑定按钮事件
        document.getElementById('uploadBtn').onclick = () => {
            console.log('按钮被点击了');
            uploadFiles();
        };
        
        // 页面加载时自动加载文件列表
        loadFiles();
    </script>
</body>
</html>
