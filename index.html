<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私有文件存储</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f4f7fc}
        .login{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center}
        .login-box{background:#fff;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center}
        input{width:100%;height:50px;margin:10px 0;padding:0 15px;border:1px solid #ddd;border-radius:12px;font-size:16px}
        button{width:100%;height:50px;background:#667eea;color:white;border:none;border-radius:12px;font-size:16px;cursor:pointer}
        #main{display:none;padding:20px}
        .tools{margin:20px 0;display:flex;gap:10px;flex-wrap:wrap}
        .btn{padding:10px 16px;background:#667eea;color:white;border:none;border-radius:8px}
        .danger{background:#f56c6c}
        .file-item{background:#fff;padding:12px;margin:8px 0;border-radius:10px;display:flex;justify-content:space-between}
    </style>
</head>
<body>

<div class="login" id="loginPage">
    <div class="login-box">
        <h2>🔐 登录</h2>
        <input type="password" id="pwd" placeholder="密码：123456">
        <button id="loginBtn">点我登录</button>
    </div>
</div>

<div id="main">
    <h1>📁 文件管理</h1>
    <div class="tools">
        <input type="file" id="fileInput" multiple webkitdirectory directory>
        <button class="btn" onclick="upload()">上传</button>
        <button class="btn" onclick="batchDownload()">批量下载</button>
        <button class="btn danger" onclick="batchDel()">批量删除</button>
    </div>
    <div id="fileList"></div>
</div>

<script>
// ========== 配置 ==========
const SUPABASE_URL = "https://ivmgttyeszqvlqnpqsrw.supabase.co";
const SUPABASE_KEY = "sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V";
const PASSWORD = "123456";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==========================================
// 登录（一定有反应！）
// ==========================================
document.getElementById("loginBtn").onclick = function () {
    let val = document.getElementById("pwd").value;
    if (val === PASSWORD) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("main").style.display = "block";
        loadFiles();
    } else {
        alert("密码错误");
    }
};

// ==========================================
// 加载文件
// ==========================================
async function loadFiles() {
    let dom = document.getElementById("fileList");
    dom.innerHTML = "加载中...";
    
    let { data, error } = await supabase.storage.from("files").list();
    if (error) {
        dom.innerHTML = "错误：" + error.message;
        return;
    }

    let html = "";
    data.forEach(f => {
        let url = supabase.storage.from("files").getPublicUrl(f.name).data.publicUrl;
        html += `
        <div class="file-item">
            <input type="checkbox" value="${f.name}"> ${f.name}
            <div>
                <a href="${url}" target="_blank">打开</a> |
                <button onclick="del('${f.name}')">删除</button>
            </div>
        </div>`;
    });
    dom.innerHTML = html;
}

// ==========================================
// 上传
// ==========================================
async function upload() {
    let files = document.getElementById("fileInput").files;
    for (let f of files) {
        let safe = f.name.replace(/[^a-z0-9_\-.]/gi, "_");
        await supabase.storage.from("files").upload(Date.now() + "_" + safe, f);
    }
    alert("上传成功");
    loadFiles();
}

// ==========================================
// 删除
// ==========================================
async function del(name) {
    if (!confirm("确定删除？")) return;
    await supabase.storage.from("files").remove([name]);
    loadFiles();
}

// ==========================================
// 批量删除
// ==========================================
async function batchDel() {
    let arr = Array.from(document.querySelectorAll("input:checked")).map(i => i.value);
    if (arr.length === 0) return alert("请选择");
    await supabase.storage.from("files").remove(arr);
    loadFiles();
}

// ==========================================
// 批量下载
// ==========================================
function batchDownload() {
    let arr = Array.from(document.querySelectorAll("input:checked")).map(i => i.value);
    arr.forEach(n => {
        let u = supabase.storage.from("files").getPublicUrl(n).data.publicUrl;
        let a = document.createElement("a");
        a.href = u; a.download = n; a.click();
    });
}
</script>

</body>
</html>
