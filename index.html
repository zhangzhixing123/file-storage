<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>共享文件存储 - 认证版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #667eea; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; }
        .login-card { max-width: 400px; margin: 100px auto; text-align: center; }
        input, button { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #667eea; color: white; cursor: pointer; border: none; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 16px; }
        .file-card { background: white; border-radius: 12px; padding: 12px; cursor: pointer; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .file-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .search-box input { width: 250px; }
        .category-tabs { display: flex; gap: 8px; }
        .tab { padding: 6px 16px; background: #e0e0e0; border-radius: 20px; cursor: pointer; }
        .tab.active { background: #667eea; color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #ff5252; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const SUPABASE_URL = 'https://ivmgttyeszqvlqnpqsrw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_owL4oYiO_0v7tVNArUgaaA_0TUN-o0V';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let allFiles = [];
        let currentCategory = 'all';
        let currentSearch = '';
        
        // 判断文件类型
        function getFileType(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'image';
            if (['pdf','doc','docx','txt','xls','xlsx'].includes(ext)) return 'document';
            return 'other';
        }
        
        // 渲染登录页面
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-card card">
                    <h2>📁 共享文件存储</h2>
                    <p>使用邮箱注册/登录</p>
                    <input type="email" id="email" placeholder="邮箱">
                    <input type="password" id="password" placeholder="密码（至少6位）">
                    <button onclick="signUp()">注册</button>
                    <button onclick="signIn()" style="margin-top:8px;">登录</button>
                    <div id="authMsg" style="color:red; margin-top:12px;"></div>
                </div>
            `;
        }
        
        // 渲染主界面
        async function renderMain() {
            await loadFiles();
            
            const categories = ['all', 'image', 'document', 'other'];
            const categoryNames = { all: '全部', image: '图片', document: '文档', other: '其他' };
            
            let filtered = [...allFiles];
            if (currentCategory !== 'all') {
                filtered = filtered.filter(f => getFileType(f.name) === currentCategory);
            }
            if (currentSearch) {
                filtered = filtered.filter(f => f.name.toLowerCase().includes(currentSearch.toLowerCase()));
            }
            
            let filesHtml = '';
            if (filtered.length === 0) {
                filesHtml = '<div class="loading">暂无文件，请上传</div>';
            } else {
                filesHtml = '<div class="file-grid">' + filtered.map(file => {
                    const url = supabase.storage.from('files').getPublicUrl(file.name).data.publicUrl;
                    const isImage = getFileType(file.name) === 'image';
                    return `
                        <div class="file-card" onclick="window.open('${url}','_blank')">
                            ${isImage ? `<img src="${url}" onerror="this.src='https://placehold.co/150x150?text=Image'">` : '<div style="font-size:48px; padding:30px;">📄</div>'}
                            <div>${file.name.length > 20 ? file.name.slice(0,17)+'...' : file.name}</div>
                        </div>
                    `;
                }).join('') + '</div>';
            }
            
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div class="header">
                        <h2>📁 共享文件存储</h2>
                        <div>
                            <span style="margin-right:16px;">${currentUser?.email}</span>
                            <button class="logout-btn" onclick="signOut()">退出</button>
                        </div>
                    </div>
                    
                    <div class="toolbar">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="🔍 搜索文件名..." oninput="searchFiles(this.value)">
                        </div>
                        <div class="category-tabs">
                            ${categories.map(cat => `<div class="tab ${currentCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${categoryNames[cat]}</div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="upload-area" style="margin-bottom:20px;">
                        <input type="file" id="fileInput" multiple>
                        <button onclick="uploadFiles()">📤 上传文件</button>
                    </div>
                    
                    ${filesHtml}
                </div>
            `;
        }
        
        async function loadFiles() {
            if (!currentUser) return;
            const { data, error } = await supabase.storage.from('files').list();
            if (!error) allFiles = data || [];
        }
        
        async function uploadFiles() {
            const input = document.getElementById('fileInput');
            const files = input.files;
            if (!files.length) { alert('请选择文件'); return; }
            
            for (let file of files) {
                const fileName = Date.now() + '_' + file.name;
                await supabase.storage.from('files').upload(fileName, file);
            }
            alert('上传完成！');
            input.value = '';
            renderMain();
        }
        
        window.searchFiles = (val) => { currentSearch = val; renderMain(); };
        window.setCategory = (cat) => { currentCategory = cat; renderMain(); };
        
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) document.getElementById('authMsg').innerText = error.message;
            else document.getElementById('authMsg').innerText = '注册成功！请登录';
        }
        
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('authMsg').innerText = error.message;
            else {
                currentUser = data.user;
                renderMain();
            }
        }
        
        window.signUp = signUp;
        window.signIn = signIn;
        window.signOut = async () => {
            await supabase.auth.signOut();
            currentUser = null;
            renderLogin();
        };
        window.uploadFiles = uploadFiles;
        
        // 检查当前登录状态
        supabase.auth.getSession().then(({ data }) => {
            if (data.session) {
                currentUser = data.session.user;
                renderMain();
            } else {
                renderLogin();
            }
        });
    </script>
</body>
</html>
